name: Buf CI
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  pull-requests: write

jobs:
  buf:
    name: Run Buf linter, format, breaking changes, and generate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run linter
        run: buf lint

      - name: Run format
        run: buf format

      - name: Checking breaking changes
        run: buf breaking --against "https://github.com/cobotar/protocol.git#branch=main"

      - name: Generate proto messages
        run: buf generate
