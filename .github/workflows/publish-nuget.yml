name: Publish NuGet

on:
  workflow_run:
    workflows: ["Buf CI"]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: > # only publish to NuGet on tag pushes
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    name: Publish NuGet Package 📦
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET Core @ Latest
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/cobotar/index.json
        env:
          NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Verify commit exists in origin/main
        run: git branch --remote --contains | grep origin/main

      - name: Extract release notes
        run: |
          git log --pretty=format:'%d %s' "${{ github.event.workflow_run.head_branch }}" | perl -pe 's| \(.*tag: v(\d+.\d+.\d+(-preview\d{3})?)(, .*?)*\)|\n## \1\n|g' > RELEASE-NOTES

      - name: Set VERSION variable from tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Pack
        run: |
          cd csharp
          dotnet pack -c Release /p:Version=${VERSION} --output out

      - name: Push
        run: dotnet nuget push ./csharp/out/cobotar.protocol.${VERSION}.nupkg --skip-duplicate --api-key ${GITHUB_TOKEN}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}