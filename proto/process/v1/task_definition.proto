syntax = "proto3";
package process.v1;

import "buf/validate/validate.proto";
import "capability/v1/actor_constraint.proto";
import "capability/v1/actor_skill.proto";
import "capability/v1/skill_requirement.proto";
import "capability/v1/tool_requirement.proto";
import "common/v1/enums.proto";
import "common/v1/key_value_constraint.proto";
import "common/v1/time.proto";
import "geometry/v1/local_target.proto";
import "geometry/v1/vector3.proto";
import "resources/v1/asset_definition.proto";
import "resources/v1/container_definition.proto";
import "validation/v1/predefined_string_rules.proto";
import "variance/v1/variant_rule.proto";

option csharp_namespace = "Messages.Process.V1";
option go_package = "github.com/cobotar/protocol/messages/process/v1";

enum TaskType {
  TASK_TYPE_UNSPECIFIED = 0;
  TASK_TYPE_INSPECT = 1;
  TASK_TYPE_FASTEN = 2;
  TASK_TYPE_UNFASTEN = 3;
  TASK_TYPE_MOUNT = 4;
  TASK_TYPE_UNMOUNT = 5;
  TASK_TYPE_MOVE = 6;
  TASK_TYPE_REMOVE = 7;
  TASK_TYPE_APPLY = 8;
  TASK_TYPE_WIPE = 9;
  TASK_TYPE_ALIGN = 10;
  TASK_TYPE_INSERT = 11;
  TASK_TYPE_HOLD = 12;
  TASK_TYPE_VERIFY = 13;
  TASK_TYPE_PICK = 14;
  TASK_TYPE_PLACE = 15;
  TASK_TYPE_SCAN = 16;
  TASK_TYPE_WAIT = 17;
  TASK_TYPE_CHECK = 18;
  TASK_TYPE_ACKNOWLEDGE = 19;
  // Start, stop, reset, open, close,
}

enum TaskAssignmentPreference {
  TASK_ASSIGNMENT_PREFERENCE_UNSPECIFIED = 0;
  TASK_ASSIGNMENT_PREFERENCE_PREFER_HUMAN = 1;
  TASK_ASSIGNMENT_PREFERENCE_ONLY_HUMAN = 2;
  TASK_ASSIGNMENT_PREFERENCE_PREFER_ROBOT = 3;
  TASK_ASSIGNMENT_PREFERENCE_ONLY_ROBOT = 4; // Only use this if it truly must be done by a robot. Otherwise use prefer-robot
  TASK_ASSIGNMENT_PREFERENCE_EITHER = 5;
}

message ProductTarget {
  string node_id = 1; // Assembly node occurrence the task acts on.
  string part_definition_id = 2; // Optional denormalized helper.
  geometry.v1.LocalTarget local_target = 3; // Pose/anchor relative to the chosen product reference.
}

message ContainerTarget {
  string container_definition_id = 1; // Generic container type, e.g. pallet, tray, jig, fixture, bin.
  string slot_id = 2; // Optional slot definition within that container definition.
  resources.v1.ContainerSlotType slot_type = 3; // Semantic slot kind if known.
}

// Generic authoring-time resource references.
message ResourceTarget {
  string asset_definition_id = 1; // Camera, feeder, HMI, sensor, conveyor, etc.
  string robot_definition_id = 2; // Robot type required or referenced by the task.
  string container_definition_id = 3; // Optional generic container used outside explicit workpiece targeting.
}

// TaskTarget captures the static authoring-time target of a task.
//
// It intentionally avoids concrete runtime/deployment bindings such as
// specific robot instances, camera instances, or pallet instances. Those should
// instead be resolved into runtime.v1.TaskRun / TaskRuntimeBinding.
message TaskTarget {
  // ---------------------------------------------------------------------------
  // What the task acts on
  // ---------------------------------------------------------------------------
  // These fields describe the static/generic authoring intent of the task.
  // They should stay reusable across workcells and deployments.

  ProductTarget product = 1; // Optional product-structure target.
  ContainerTarget container = 2; // Optional container/slot target.

  // ---------------------------------------------------------------------------
  // What generic resource type is relevant to the task
  // ---------------------------------------------------------------------------
  // These references stay at definition/type level rather than concrete runtime
  // instance level, so the recipe remains portable.

  ResourceTarget resource = 3; // Optional generic resource target.
}

// TaskEndpoint is used for source/destination style references in tasks such
// as pick/place, move, kitting, and transfer operations.
//
// Like TaskTarget, TaskEndpoint is static/generic and should remain reusable
// across workcells. Concrete runtime bindings belong in runtime.v1.TaskRun.
message TaskEndpoint {
  ProductTarget product = 1;
  ContainerTarget container = 2;
}

message ValidationRequirement {
  bool require_tool_feedback = 1;
  bool require_vision_check = 2;
  bool allow_manual_confirmation = 3;
  capability.v1.SkillLevel manual_confirmation_min_level = 4;
  resources.v1.ValidationMode mode = 5;
  repeated common.v1.KeyValueConstraint constraints = 6;
}

message TaskExecutionPolicy {
  TaskAssignmentPreference assignment_preference = 1;
  capability.v1.ActorConstraint actor_constraint = 2;
  bool can_reassign = 3;
  bool can_undo = 4;
  common.v1.EstimatedDuration estimated_duration = 5;
  bool require_full_guidance = 6;
}

message TaskOverride {
  repeated variance.v1.VariantRule when = 1;
  string instruction_text = 2;
  string target_node_id = 3;
  geometry.v1.Vector3 approach = 4;
}

// TaskDefinition is the static/universal authoring-time description of a task.
//
// It should remain reusable across workcells, deployments, and specific
// equipment instances. Runtime-specific information such as concrete robot,
// asset, station, or container bindings belongs in runtime.v1.TaskRun.
message TaskDefinition {
  string id = 1;
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true];
  string icon = 3;
  string description = 4;
  string instruction_text = 5; // Human-readable instruction shown to the operator or author.
  int32 sequence_number = 6 [(buf.validate.field).int32.gte = 0]; // Ordering hint within the parent sequence.
  TaskType task_type = 7 [(buf.validate.field).enum.defined_only = true]; // The semantic action to perform, e.g. FASTEN, PICK, PLACE, VERIFY.
  TaskTarget target = 8; // The primary static/generic thing/location/resource this task acts on.
  geometry.v1.Vector3 insertion_offset = 9; // Optional static guidance/planning hint from final pose to pre-insertion pose, in mm.
  geometry.v1.Vector3 approach_offset = 10; // Optional static guidance/planning hint from final pose to preferred approach pose, in mm.
  capability.v1.ToolRequirement tool_requirement = 12; // Tools or tool roles needed to perform the task.
  repeated capability.v1.SkillRequirement skill_requirements = 13; // Skills/qualifications needed by the acting human/robot.
  ValidationRequirement validation = 14; // How task completion should be confirmed or validated.
  TaskExecutionPolicy execution_policy = 15; // Static execution policy, preferences, and permissions used by planning/runtime.
  common.v1.SafetyRelevance safety_relevance = 16; // Safety significance of the task.
  TaskEndpoint source = 17; // Optional static/generic source reference for move, pick/place, kitting, storage, tray, pallet, or fixture operations.
  TaskEndpoint destination = 18; // Optional static/generic destination reference for move, pick/place, kitting, storage, tray, pallet, or fixture operations.
  repeated variance.v1.VariantRule applicability = 21; // Applies if any rule matches. Empty means always applicable.
  repeated TaskOverride overrides = 22;
}

message TaskDefinitions {
  repeated TaskDefinition items = 1;
}
