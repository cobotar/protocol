syntax = "proto3";
package process.v1;

import "buf/validate/validate.proto";
import "geometry/v1/local_target.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Process.V1";
option go_package = "github.com/cobotar/protocol/messages/process/v1";

// Defines how the children of a SequenceDefinition are executed and how the
// sequence determines completion.
//
// A sequence should contain either child sequences or child tasks, but not both.
// Use nested sequences to separate orchestration structure from executable task groups.
enum SequenceOperator {
  // Default / undefined behavior.
  //
  // Should normally not appear in valid process definitions. Runtimes may
  // treat this as SEQUENCE for backward compatibility or reject the recipe
  // during validation.
  SEQUENCE_OPERATOR_UNSPECIFIED = 0;

  // Children execute sequentially in the order they are defined.
  //
  // Each child starts only after the previous child has completed.
  // The sequence completes when the final child completes.
  //
  // Example:
  //   Pick part → Align part → Fasten part → Inspect assembly
  SEQUENCE_OPERATOR_ORDERED = 1;

  // All children may execute concurrently.
  //
  // The runtime may start all children at the same time if resources allow.
  // The sequence completes only when all children have completed.
  //
  // This operator is commonly used for human-robot collaboration or when
  // multiple independent tasks can be performed in parallel.
  //
  // Example:
  //   Robot holds component
  //   Human installs screws
  //   Vision system verifies alignment
  SEQUENCE_OPERATOR_PARALLEL = 2;

  // Exactly one child is selected and executed.
  //
  // The runtime chooses a single branch based on conditions such as:
  //   - variant configuration
  //   - resource availability
  //   - actor capabilities
  //   - runtime decision logic
  //
  // The sequence completes when the selected child completes.
  //
  // Example:
  //   Robot tightening procedure
  //   OR
  //   Human tightening procedure
  SEQUENCE_OPERATOR_EXCLUSIVE = 3;

  // One or more children may execute.
  //
  // The runtime evaluates each child independently and may execute any
  // subset of them based on conditions such as variant configuration,
  // process parameters, or runtime state.
  //
  // The sequence completes when all selected children have completed.
  //
  // Example:
  //   Optional inspections:
  //     - Visual inspection
  //     - Torque verification
  //     - Leak test
  SEQUENCE_OPERATOR_INCLUSIVE = 4;
}

// SequenceDefinition represents a unit of control flow within a process recipe.
//
// A sequence groups either:
//   - child sequences (for orchestration / structure), or
//   - child tasks (for executable work)
//
// but not both at the same time.
//
// This separation ensures clear execution semantics and simplifies runtime
// scheduling, validation, and UI representation.
//
// Sequences form a hierarchical tree starting from a root sequence and are
// evaluated by the runtime according to the specified operator.
message SequenceDefinition {
  option (buf.validate.message).cel = {
    id: "sequence_definition.children_not_mixed"
    message: "a sequence must contain either child_sequence_ids or child_task_ids, but not both"
    expression: "!(size(this.child_sequence_ids) > 0 && size(this.child_task_ids) > 0)"
  };

  option (buf.validate.message).cel = {
    id: "sequence_definition.operator_specified_when_children_exist"
    message: "operator must be specified when a sequence has children"
    expression: "(size(this.child_sequence_ids) + size(this.child_task_ids) == 0) || this.operator != 0"
  };

  option (buf.validate.message).cel = {
    id: "sequence_definition.parallel_requires_multiple_children"
    message: "PARALLEL sequences should have at least two children"
    expression: "this.operator != 2 || (size(this.child_sequence_ids) + size(this.child_task_ids) >= 2)"
  };

  option (buf.validate.message).cel = {
    id: "sequence_definition.exclusive_requires_multiple_children"
    message: "EXCLUSIVE sequences should have at least two children"
    expression: "this.operator != 3 || (size(this.child_sequence_ids) + size(this.child_task_ids) >= 2)"
  };

  option (buf.validate.message).cel = {
    id: "sequence_definition.inclusive_requires_multiple_children"
    message: "INCLUSIVE sequences should have at least two children"
    expression: "this.operator != 4 || (size(this.child_sequence_ids) + size(this.child_task_ids) >= 2)"
  };

  option (buf.validate.message).cel = {
    id: "sequence_definition.bulk_complete_requires_task_children"
    message: "can_bulk_complete is only valid for sequences with child_task_ids"
    expression: "!this.can_bulk_complete || size(this.child_task_ids) > 0"
  };

  // Unique identifier for the sequence definition.
  string id = 1 [(buf.validate.field).string.(validation.v1.sequence_definition_id_component) = true];

  // Human-readable name used in UI and authoring tools.
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true];

  // Optional icon representing the sequence in UI contexts.
  string icon = 3;

  // Optional textual description of the sequence purpose or behavior.
  string description = 4;

  // Ordering hint used to sort sibling sequences during generation and execution.
  // Lower values are executed earlier for ORDERED sequences.
  int32 sequence_number = 5 [(buf.validate.field).int32.gte = 0];

  // Identifier of the parent sequence in the hierarchy. Empty for root sequence.
  string parent_sequence_id = 6 [(buf.validate.field).string.(validation.v1.sequence_definition_id_component) = true];

  // Defines how child elements (sequences or tasks) are executed and combined.
  SequenceOperator operator = 7 [(buf.validate.field).enum.defined_only = true];

  // Child sequence references used when this sequence acts as an orchestration node.
  // Only one of child_sequence_ids or child_task_ids should be populated.
  repeated string child_sequence_ids = 8 [(buf.validate.field).repeated.items.string.(validation.v1.sequence_definition_id_component) = true];

  // Child task references used when this sequence is a leaf execution node.
  // Only one of child_sequence_ids or child_task_ids should be populated.
  repeated string child_task_ids = 9 [(buf.validate.field).repeated.items.string.(validation.v1.task_definition_id_component) = true];

  // Optional local target defining the spatial or logical context for this sequence.
  geometry.v1.LocalTarget local_target = 10;

  // Indicates whether this sequence is optional and may be skipped during execution.
  bool optional = 11;

  // Indicates whether all child tasks in this sequence can be completed in bulk.
  bool can_bulk_complete = 12;
}

message SequenceDefinitions {
  repeated SequenceDefinition items = 1;
}
