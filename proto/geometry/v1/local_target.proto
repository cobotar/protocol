syntax = "proto3";
package geometry.v1;

import "geometry/v1/anchor.proto";
import "geometry/v1/point.proto";
import "geometry/v1/quad.proto";

option csharp_namespace = "Messages.Common.V1";
option go_package = "github.com/cobotar/protocol/messages/geometry/v1";

message LocalTarget {
  Anchor anchor = 1;
  Point position = 2;
  Quad orientation = 3;
}
