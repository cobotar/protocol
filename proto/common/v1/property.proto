syntax = "proto3";
package common.v1;

import "buf/validate/validate.proto";
import "common/v1/color.proto";
import "geometry/v1/anchor.proto";
import "geometry/v1/pose.proto";
import "geometry/v1/vector3.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Common.V1";
option go_package = "github.com/cobotar/protocol/messages/common/v1";

// Used to specify the type of a property
enum PropertyType {
  PROPERTY_TYPE_UNSPECIFIED = 0;
  PROPERTY_TYPE_BOOL = 1; // Bool type property (true/false)
  PROPERTY_TYPE_INT = 2; // Int type property
  PROPERTY_TYPE_FLOAT = 3; // Float type property
  PROPERTY_TYPE_DOUBLE = 4; // Double type property
  PROPERTY_TYPE_STRING = 5; // String type property
  PROPERTY_TYPE_VECTOR3 = 6; // Vector3 type property - {x, y, z}
  PROPERTY_TYPE_POSE = 7; // Pose type property - LocalizedPose(id, anchor, position, orientation, state, ...)
  PROPERTY_TYPE_ANCHOR = 8; // Anchor type property - Anchor(reference, frame)
  PROPERTY_TYPE_COLOR = 9; // Color type property - Color(r,g,b,a)
  PROPERTY_TYPE_ROBOT = 10; // Robot type property - robot_id as string
  PROPERTY_TYPE_ENUM = 11; // Enum type property - string from list of strings (defined in EnumExtras)
  PROPERTY_TYPE_ENUM_MULTI = 12; // Enum-multi type property - select multiple strings from list of strings (defined in EnumExtras)
  PROPERTY_TYPE_ICON = 13; // Icon property type - icon-name-something from https://pictogrammers.com/
  PROPERTY_TYPE_ASSET = 14; // Asset type property - asset_id as string
  PROPERTY_TYPE_WORKER = 15; // Worker type property - worker_id as string
  //PROPERTY_TYPE_AGENT = 15; // Agent is a combination of workers, robots, and assets (who can perform tasks) TODO: should it point towards the worker or an AR-device?
}

// Specifies where the value of a property originates from.
enum PropertyOrigin {
  PROPERTY_ORIGIN_UNSPECIFIED = 0;

  // Value is stored directly on the PropertyInstance.
  // For RUNTIME properties, the template value may be overridden during materialization.
  // Hence, in general: the value of the property is fixed and must be changed manually
  PROPERTY_ORIGIN_FIXED = 1;

  // Value is resolved by mirroring another property definition in the same runtime context.
  PROPERTY_ORIGIN_MIRROR = 2;
}

enum PropertyGroup {
  PROPERTY_GROUP_UNSPECIFIED = 0;
  PROPERTY_GROUP_OUTPUT = 1;
  PROPERTY_GROUP_NON_EDITABLE = 2;
  PROPERTY_GROUP_STYLING = 3;
  PROPERTY_GROUP_LOCATION = 4;
  PROPERTY_GROUP_ICON = 5;
  PROPERTY_GROUP_CONFIGURATION = 6;
  PROPERTY_GROUP_HIDDEN = 7;
  PROPERTY_GROUP_INPUT_SLOT = 8;
}

enum PropertyPermission {
  PROPERTY_PERMISSION_UNSPECIFIED = 0; // Unspecified: can be edited by all
  PROPERTY_PERMISSION_BASIC = 10; // Basic: can be edited by users with some permission to edit
  PROPERTY_PERMISSION_COSMETIC = 20; // Cosmetic: can be edited by users with cosmetic+full permission
  PROPERTY_PERMISSION_FULL = 30; // Full: can be edited by users with full permission
  PROPERTY_PERMISSION_NONE = 40; // None: can't be edited (e.g. outputs or stuff that requires a delete + create new)
}

enum PropertySemanticRole {
  PROPERTY_SEMANTIC_ROLE_UNSPECIFIED = 0;

  // Layout / panels
  PROPERTY_SEMANTIC_ROLE_PANEL_BACKGROUND_COLOR = 1;
  PROPERTY_SEMANTIC_ROLE_PANEL_TEXT_COLOR = 2;
  PROPERTY_SEMANTIC_ROLE_PANEL_BORDER_COLOR = 3;
  PROPERTY_SEMANTIC_ROLE_PANEL_OPACITY = 4;
  PROPERTY_SEMANTIC_ROLE_PANEL_CORNER_RADIUS = 5;

  // Typography
  PROPERTY_SEMANTIC_ROLE_PRIMARY_TEXT_COLOR = 20;
  PROPERTY_SEMANTIC_ROLE_SECONDARY_TEXT_COLOR = 21;
  PROPERTY_SEMANTIC_ROLE_TEXT_SIZE = 22;
  PROPERTY_SEMANTIC_ROLE_TITLE_TEXT_SIZE = 23;

  // General state colors
  PROPERTY_SEMANTIC_ROLE_ACCENT_COLOR = 40;
  PROPERTY_SEMANTIC_ROLE_SUCCESS_COLOR = 41;
  PROPERTY_SEMANTIC_ROLE_WARNING_COLOR = 42;
  PROPERTY_SEMANTIC_ROLE_ERROR_COLOR = 43;
  PROPERTY_SEMANTIC_ROLE_DISABLED_COLOR = 44;

  // Task state
  PROPERTY_SEMANTIC_ROLE_CURRENT_TASK_COLOR = 60;
  PROPERTY_SEMANTIC_ROLE_UPCOMING_TASK_COLOR = 61;
  PROPERTY_SEMANTIC_ROLE_COMPLETED_TASK_COLOR = 62;
  PROPERTY_SEMANTIC_ROLE_BLOCKED_TASK_COLOR = 63;
  PROPERTY_SEMANTIC_ROLE_OPTIONAL_TASK_COLOR = 64;

  // Actors
  PROPERTY_SEMANTIC_ROLE_OPERATOR_COLOR = 80;
  PROPERTY_SEMANTIC_ROLE_ROBOT_COLOR = 81;
  PROPERTY_SEMANTIC_ROLE_SHARED_TASK_COLOR = 82;
  PROPERTY_SEMANTIC_ROLE_SUPERVISOR_COLOR = 83;

  // Resources
  PROPERTY_SEMANTIC_ROLE_PART_COLOR = 100;
  PROPERTY_SEMANTIC_ROLE_TOOL_COLOR = 101;
  PROPERTY_SEMANTIC_ROLE_ASSET_COLOR = 102;
  PROPERTY_SEMANTIC_ROLE_CONTAINER_COLOR = 103;

  // Spatial AR visuals
  PROPERTY_SEMANTIC_ROLE_TARGET_GHOST_COLOR = 120;
  PROPERTY_SEMANTIC_ROLE_TARGET_HIGHLIGHT_COLOR = 121;
  PROPERTY_SEMANTIC_ROLE_PATH_COLOR = 122;
  PROPERTY_SEMANTIC_ROLE_ZONE_COLOR = 123;
  PROPERTY_SEMANTIC_ROLE_ANCHOR_COLOR = 124;

  // Robot intent
  PROPERTY_SEMANTIC_ROLE_ROBOT_PATH_COLOR = 140;
  PROPERTY_SEMANTIC_ROLE_ROBOT_SILHOUETTE_COLOR = 141;
  PROPERTY_SEMANTIC_ROLE_ROBOT_INTENT_COLOR = 142;
  PROPERTY_SEMANTIC_ROLE_ROBOT_OCCUPANCY_COLOR = 143;

  // Audio / haptics / notification defaults
  PROPERTY_SEMANTIC_ROLE_SUCCESS_SOUND = 160;
  PROPERTY_SEMANTIC_ROLE_WARNING_SOUND = 161;
  PROPERTY_SEMANTIC_ROLE_ERROR_SOUND = 162;
  PROPERTY_SEMANTIC_ROLE_NOTIFICATION_ICON = 163;

  // Timing / animation
  PROPERTY_SEMANTIC_ROLE_PULSE_DURATION = 180;
  PROPERTY_SEMANTIC_ROLE_FADE_DURATION = 181;
  PROPERTY_SEMANTIC_ROLE_ANIMATION_SPEED = 182;
  PROPERTY_SEMANTIC_ROLE_HIGHLIGHT_THICKNESS = 183;
}

// PropertyScope
//
// For authoring:
//   ENTITY scope:
//    UI edits the entity/template PropertyInstance
//
//   RUNTIME scope:
//     UI can show the definition and maybe a default initial value,
//     but runtime creates ephemeral instances per materialization
//
enum PropertyScope {
  PROPERTY_SCOPE_UNSPECIFIED = 0;

  // One authored instance shared by all materializations of the owning entity.
  // Example: MessageFeedback.title.
  PROPERTY_SCOPE_ENTITY = 1;

  // One instance per materialized runtime context.
  // Used for runtime outputs, injected inputs, and dynamic mirrored inputs.
  // Examples: outputGaze, robot slot, Action.active.
  PROPERTY_SCOPE_RUNTIME = 2;
}

// PropertyDefinition
//   metadata/schema
//
// Every PropertyDefinition must have exactly one template PropertyInstance stored.
//
// Overall, we have these categories of properties:
//   Static authored input
//    - scope: ENTITY
//    - origin: FIXED
//    - example: MessageFeedback.title
//
//  Injected runtime input
//    - scope: RUNTIME
//    - origin: FIXED
//    - value supplied/overridden from ARResourceBinding during materialization
//    - example: robot slot, asset slot
//
//  Dynamic runtime input
//    - scope: RUNTIME
//    - origin: MIRROR
//    - mirror_property_definition_id points to another runtime property definition
//    - example: Action.active mirrors MessageFeedback.outputGaze
//
//  Runtime output
//    - scope: RUNTIME
//    - origin: FIXED
//    - runtime system mutates value
//    - example: MessageFeedback.outputGaze
message PropertyDefinition {
  option (buf.validate.message).oneof = {
    fields: [
      "number_extras",
      "enum_extras",
      "vector3_extras",
      "color_extras",
      "pose_extras",
      "anchor_extras"
    ]
  };

  option (buf.validate.message).cel = {
    id: "enum_requires_enum_extras"
    message: "enum_extras must be set when type is ENUM or ENUM_MULTI"
    expression: "!(this.type == 11 || this.type == 12) || has(this.enum_extras)"
  };

  string id = 1 [(buf.validate.field).string.(validation.v1.property_definition_id_component) = true];
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true];
  string icon = 3;
  string description = 4;
  PropertyType type = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  string parent_id = 6; // direct owner: feedback id, action id, ar_config id, etc.
  string authoring_context_id = 7; // grouping/root context: ar_config id
  PropertyScope scope = 8 [(buf.validate.field).enum.defined_only = true];

  // UI/authoring metadata
  PropertyPermission minimum_required_permission = 9 [(buf.validate.field).enum.defined_only = true];
  repeated PropertyOrigin allowed_origins = 10 [(buf.validate.field).repeated.items.enum.defined_only = true];
  PropertyGroup group = 11 [(buf.validate.field).enum.defined_only = true];
  int32 ordering = 12;
  bool hide_group = 13;
  bool advanced = 14;
  bool allow_to_be_mirrored = 15;
  PropertySemanticRole semantic_role = 16 [(buf.validate.field).enum.defined_only = true];

  NumberExtras number_extras = 41;
  EnumExtras enum_extras = 42;
  Vector3Extras vector3_extras = 43;
  ColorExtras color_extras = 44;
  PoseExtras pose_extras = 45;
  AnchorExtras anchor_extras = 46;
}

// PropertyInstance
//   value/resolution in a scope
//
// Some notes:
// Authoring edits PropertyInstances whose scope_id belongs to the template/config/binding.
// Runtime creates PropertyInstances whose scope_id belongs to the materialized runtime context.
// Mirrors always point to PropertyDefinitions and are resolved inside the active context.
message PropertyInstance {
  option (buf.validate.message).cel = {
    id: "mirror_requires_mirror_property_id"
    message: "mirror_property_id must be set when origin is MIRROR"
    expression: "this.origin != 2 || this.mirror_property_definition_id != ''"
  };

  string id = 1 [(buf.validate.field).string.(validation.v1.property_instance_id_component) = true];
  string property_definition_id = 2 [(buf.validate.field).string.(validation.v1.property_definition_id_component) = true];

  PropertyScope scope = 3; // Copied value from PropertyDefinition

  // For ENTITY, identifies the owning template/entity scope.
  // For RUNTIME, identifies the materialized runtime context.
  // Template runtime instances can use the owning template/entity id.
  string scope_id = 4;

  PropertyOrigin origin = 5 [(buf.validate.field).enum.defined_only = true];
  string mirror_property_definition_id = 6 [(buf.validate.field).string.(validation.v1.property_definition_id_component) = true];

  PropertyValue value = 7 [(buf.validate.field).required = true];
}

// PropertyValue
//   typed payload
message PropertyValue {
  option (buf.validate.message).oneof = {
    fields: [
      "bool_value",
      "int_value",
      "float_value",
      "double_value",
      "string_value",
      "vector3_value",
      "pose_value",
      "anchor_value",
      "color_value",
      "robot_id_value",
      "enum_value",
      "enum_multi_value",
      "icon_value",
      "asset_id_value",
      "worker_id_value"
    ]
    required: true
  };

  option (buf.validate.message).cel = {
    id: "property_type_matches_value_kind"
    message: "type must match the kind of value field"
    expression: "((this.type == 1 && has(this.bool_value)) || (this.type == 2 && has(this.int_value)) || (this.type == 3 && has(this.float_value)) || (this.type == 4 && has(this.double_value)) || (this.type == 5 && has(this.string_value)) ||(this.type == 6 && has(this.vector3_value)) || (this.type == 7 && has(this.pose_value)) || (this.type == 8 && has(this.anchor_value)) || (this.type == 9 && has(this.color_value)) || (this.type == 10 && has(this.robot_id_value)) || (this.type == 11 && has(this.enum_value)) ||(this.type == 12 && size(this.enum_multi_value) > 0) || (this.type == 13 && has(this.icon_value)) || (this.type == 14 && has(this.asset_id_value)) || (this.type == 15 && has(this.worker_id_value)))"
  };

  PropertyType type = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  optional bool bool_value = 21;
  optional sint64 int_value = 22;
  optional float float_value = 23;
  optional double double_value = 24;
  optional string string_value = 25;
  geometry.v1.Vector3 vector3_value = 26;
  geometry.v1.LocalizedPose pose_value = 27;
  geometry.v1.Anchor anchor_value = 28;
  common.v1.Color color_value = 29;
  optional string robot_id_value = 30;
  optional string enum_value = 31 [(buf.validate.field).string.min_len = 1];
  repeated string enum_multi_value = 32 [(buf.validate.field).repeated = {
    min_items: 1
    items: {
      string: {min_len: 1}
    }
  }];
  optional string icon_value = 33;
  optional string asset_id_value = 34;
  optional string worker_id_value = 35;
}

// PropertyInstanceUpdate
//   mutate one concrete instance
message PropertyInstanceUpdate {
  option (buf.validate.message).cel = {
    id: "fixed_origin_requires_value"
    message: "value must be set when origin is FIXED"
    expression: "this.origin != 1 || has(this.value)"
  };

  option (buf.validate.message).cel = {
    id: "mirror_requires_mirror_property_id"
    message: "mirror_property_id must be set when origin is MIRROR"
    expression: "this.origin != 2 || this.mirror_property_definition_id != ''"
  };

  string property_instance_id = 1 [(buf.validate.field).string.(validation.v1.property_instance_id_component) = true];

  PropertyOrigin origin = 2 [(buf.validate.field).enum.defined_only = true];
  string mirror_property_definition_id = 3 [(buf.validate.field).string.(validation.v1.property_definition_id_component) = true];

  PropertyValue value = 4 [(buf.validate.field).required = true];
}

message PropertyDefinitions {
  repeated PropertyDefinition items = 1;
}

message PropertyInstances {
  repeated PropertyInstance items = 1;
}

message NumberExtras {
  option (buf.validate.message).cel = {
    id: "number_extras_consistent"
    message: "If any of min/max/step is set, all must be set; and min < max; and step <= (max-min)"
    expression: "(!has(this.min) && !has(this.max) && !has(this.step)) || (has(this.min) && has(this.max) && has(this.step) && this.min < this.max && this.step <= (this.max - this.min))"
  };

  optional double min = 1;
  optional double max = 2;
  optional double step = 3 [(buf.validate.field).double.gt = 0];
  string unit = 4 [(buf.validate.field).string.max_len = 3]; // "mm", "deg", "N"
  uint32 precision = 5 [(buf.validate.field).uint32.gte = 0]; // Decimal places for display
}

message EnumOption {
  string value = 1 [(buf.validate.field).string.min_len = 1];
  string label = 2 [(buf.validate.field).string.min_len = 1];
  string icon = 3;
  string group = 4;
  bool disabled = 5;
}

message EnumExtras {
  string placeholder = 1; // Placeholder value shown in UI when no enum is selected
  bool filter = 2; // Show filter input
  bool grouped = 3; // If options should be grouped
  bool show_icons = 4; // If options have icons and these should be shown
  uint32 max_selected_labels = 5; // Only relevant for MultiSelect: limits number of selected labels

  repeated EnumOption options = 6 [(buf.validate.field).repeated.min_items = 1];
}

message Vector3Extras {
  option (buf.validate.message).cel = {
    id: "number_extras_consistent"
    message: "If any of min/max/step is set, all must be set; and min < max; and step <= (max-min)"
    expression: "(!has(this.min) && !has(this.max) && !has(this.step)) || (has(this.min) && has(this.max) && has(this.step) && this.min < this.max && this.step <= (this.max - this.min))"
  };

  optional double min = 1;
  optional double max = 2;
  optional double step = 3 [(buf.validate.field).double.gt = 0];
  string label_x = 4 [(buf.validate.field).string.max_len = 5];
  string label_y = 5 [(buf.validate.field).string.max_len = 5];
  string label_z = 6 [(buf.validate.field).string.max_len = 5];
  string unit = 7 [(buf.validate.field).string.max_len = 3];
}

message ColorExtras {
  double step = 1 [(buf.validate.field).double.gte = 0];
  common.v1.Color default = 2;
  // TODO: allow user-preference override
}

message AnchorExtras {
  bool only_markers = 1;
}

message PoseExtras {
  bool anchor_editable = 1;
  bool pose_editable = 2;
}

// Creates a PropertyDefinition and its required template PropertyInstance.
message CreatePropertyMessage {
  option (buf.validate.message).cel = {
    id: "definition_and_value_types_match"
    message: "type must match initial_value.type"
    expression: "this.type == this.initial_value.type"
  };

  option (buf.validate.message).cel = {
    id: "mirror_requires_definition"
    message: "mirror_property_definition_id is required for MIRROR origin"
    expression: "this.origin != 2 || this.mirror_property_definition_id != ''"
  };

  // Ownership
  string parent_id = 1;
  string authoring_context_id = 2;

  // Definition
  string name = 3;
  string icon = 4;
  string description = 5;

  PropertyType type = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  PropertyScope scope = 7 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  PropertyPermission minimum_required_permission = 8;
  repeated PropertyOrigin allowed_origins = 9;
  PropertyGroup group = 10;
  int32 ordering = 11;
  bool hide_group = 12;
  bool advanced = 13;
  bool allow_to_be_mirrored = 14;
  PropertySemanticRole semantic_role = 16 [(buf.validate.field).enum.defined_only = true];

  // Template instance
  PropertyOrigin origin = 20 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  // Defaults to parent_id when empty. Needed for input-slot scopes.
  string scope_id = 21;

  string mirror_property_definition_id = 22 [(buf.validate.field).string.(validation.v1.property_definition_id_component) = true];

  PropertyValue initial_value = 23 [(buf.validate.field).required = true];

  // Type-specific definition metadata
  oneof extras {
    NumberExtras number_extras = 41;
    EnumExtras enum_extras = 42;
    Vector3Extras vector3_extras = 43;
    ColorExtras color_extras = 44;
    PoseExtras pose_extras = 45;
    AnchorExtras anchor_extras = 46;
  }
}
