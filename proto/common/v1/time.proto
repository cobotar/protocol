syntax = "proto3";
package common.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Messages.Common.V1";
option go_package = "github.com/cobotar/protocol/messages/common/v1";

message TimeWindow {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
}

message EstimatedDuration {
  int32 nominal_seconds = 1 [(buf.validate.field).int32.gte = 0]; // Expected time in seconds
  int32 min_seconds = 2 [(buf.validate.field).int32.gte = 0];
  int32 max_seconds = 3 [(buf.validate.field).int32.gte = 0];
}
