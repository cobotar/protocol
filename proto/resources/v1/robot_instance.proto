syntax = "proto3";
package resources.v1;

import "buf/validate/validate.proto";
import "common/v1/custom_properties.proto";
import "common/v1/enums.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Resources.V1";
option go_package = "github.com/cobotar/protocol/messages/resources/v1";

message RobotInstance {
  string id = 1 [(buf.validate.field).string.(validation.v1.robot_instance_id_component) = true];
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true];
  string icon = 3;
  string description = 4;
  string robot_definition_id = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.robot_definition_id_component) = true
  ];
  string serial_number = 6;
  string mounted_tool_instance_id = 7 [(buf.validate.field).string.(validation.v1.tool_instance_id_component) = true]; // The tool instance currently mounted on the robot, if any.
  repeated string available_tool_instance_ids = 8; // Tool instances available to this robot in the cell/tool dock/tool magazine.
  bool supports_tool_change = 9; // Whether this robot instance can dynamically change between available tools.
  bool is_simulated = 10;
  common.v1.ResourceStatus status = 11 [(buf.validate.field).enum.defined_only = true];

  common.v1.CustomProperties custom = 12;
}

message RobotInstances {
  repeated RobotInstance items = 1;
}
