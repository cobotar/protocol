syntax = "proto3";
package resources.v1;

import "buf/validate/validate.proto";
import "common/v1/custom_properties.proto";
import "geometry/v1/pose.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Resources.V1";
option go_package = "github.com/cobotar/protocol/messages/resources/v1";

enum StationType {
  STATION_TYPE_UNSPECIFIED = 0;
  STATION_TYPE_STORAGE = 1;
  STATION_TYPE_MANUAL_STATION = 2;
  STATION_TYPE_AUTOMATIC_STATION = 3;
  STATION_TYPE_HYBRID_STATION = 4;
}

// StationStatus describes whether a station can currently accept or execute work.
//
// This is an operational/runtime-oriented state used by loaders, planners,
// dispatchers, and UIs when deciding whether a ProcessRun can be started here.
//
// Status should be interpreted as:
// - OPEN    -> can accept new work now
// - BUSY    -> currently occupied; may still allow queueing
// - CLOSED  -> intentionally unavailable for new work
// - BLOCKED -> unavailable due to a fault, interlock, maintenance lock, or
//              other condition that should prevent execution
//
// A station may also expose capacity constraints through
// max_concurrent_processes, which is separate from this status field.
enum StationStatus {
  STATION_STATUS_UNSPECIFIED = 0;

  // Station can accept new work now.
  STATION_STATUS_OPEN = 1;

  // Station is currently occupied by one or more active runs.
  // Depending on loader policy and allow_queued_process, new runs may be queued.
  STATION_STATUS_BUSY = 2;

  // Station is intentionally unavailable for loading or running work.
  STATION_STATUS_CLOSED = 3;

  // Station is temporarily unavailable due to fault, safety interlock,
  // maintenance state, missing prerequisite, or similar blocking condition.
  STATION_STATUS_BLOCKED = 4;
}

// StationDefinition describes a concrete execution point inside a cell or line.
//
// A station is the most specific location where work is typically loaded,
// queued, executed, and tracked at runtime. Stations are therefore the primary
// target for task/resource matching in loader/planner logic.
//
// Typical station responsibilities:
// - host concrete task execution
// - own station-local tools, containers, robots, markers, and frame
// - expose operational state such as OPEN/BUSY/CLOSED/BLOCKED
// - optionally allow queueing when already occupied
message StationDefinition {
  string id = 1;
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true];
  string description = 3;
  string icon = 4;
  StationType type = 5 [(buf.validate.field).enum.defined_only = true]; // Broad station classification, e.g. manual, automatic, or hybrid.
  StationStatus status = 6 [(buf.validate.field).enum.defined_only = true]; // Current operational availability used by loaders, planners, and UIs.
  int32 max_concurrent_processes = 7 [(buf.validate.field).int32.gte = 0]; // Maximum number of active/queued processes this station should host concurrently.
  bool allow_queued_process = 8; // If true, loaders may create queued ProcessRuns when the station is BUSY.
  repeated string tool_instance_ids = 9; // Station-local tools mounted, parked, or otherwise directly available here.
  repeated string container_instance_ids = 10; // Station-local fixtures, trays, pallets, bins, or other concrete containers.
  repeated string robot_instance_ids = 11; // Robots directly assigned to or executing within this station.
  repeated string asset_instance_ids = 12; // Station-local assets such as cameras, HMIs, feeders, or sensors.
  repeated string marker_instance_ids = 13; // Markers used specifically at this station for localization, AR anchoring, or identification.
  repeated string worker_ids = 14; // Workers explicitly assigned to this station. Use cell-level worker_ids for shared pools.
  geometry.v1.LocalizedPose frame = 15; // Station-local reference frame used for runtime bindings, AR anchoring, and execution geometry.
  common.v1.CustomProperties custom = 16;
}

message StationDefinitions {
  repeated StationDefinition items = 1;
}
