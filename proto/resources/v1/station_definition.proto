syntax = "proto3";
package resources.v1;

import "buf/validate/validate.proto";
import "common/v1/custom_properties.proto";
import "geometry/v1/pose.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Resources.V1";
option go_package = "github.com/cobotar/protocol/messages/resources/v1";

enum StationType {
  STATION_TYPE_UNSPECIFIED = 0;
  STATION_TYPE_STORAGE = 1;
  STATION_TYPE_MANUAL_STATION = 2;
  STATION_TYPE_AUTOMATIC_STATION = 3;
  STATION_TYPE_HYBRID_STATION = 4;
}

message StationDefinition {
  string id = 1;
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true];
  string description = 3;
  string icon = 4;
  StationType type = 5 [(buf.validate.field).enum.defined_only = true];
  repeated string tool_instance_ids = 6;
  repeated string container_instance_ids = 7;
  repeated string robot_instance_ids = 8;
  repeated string asset_instance_ids = 9;
  repeated string marker_instance_ids = 10; // move to cell?
  repeated string worker_ids = 11; // move to cell?
  geometry.v1.LocalizedPose frame = 12;
  common.v1.CustomProperties custom = 13;
}

message StationDefinitions {
  repeated StationDefinition items = 1;
}
