syntax = "proto3";
package resources.v1;

import "buf/validate/validate.proto";
import "common/v1/custom_properties.proto";
import "common/v1/enums.proto";
import "geometry/v1/pose.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Resources.V1";
option go_package = "github.com/cobotar/protocol/messages/resources/v1";

message ContainerLocation {
  string line_id = 1 [(buf.validate.field).string.(validation.v1.line_id_component) = true];
  string cell_id = 2 [(buf.validate.field).string.(validation.v1.cell_id_component) = true];
  string station_id = 3 [(buf.validate.field).string.(validation.v1.station_id_component) = true]; // Station/cell where this container currently belongs or is mounted.
  geometry.v1.LocalizedPose pose = 4;
}

// ContainerInstance represents a concrete container in a station/cell.
//
// Examples:
// - the actual shelf bin mounted in station A
// - the actual pallet currently loaded on an indexing table
// - the actual jig installed on a workbench
message ContainerInstance {
  string id = 1 [(buf.validate.field).string.(validation.v1.container_instance_id_component) = true]; // Stable identifier of the concrete container instance.
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true]; // Display name of the instance. Often copied from the definition, but may be station-specific.
  string icon = 3; // UI icon for the instance.
  string description = 4; // Human-readable description of this particular instance.

  string container_definition_id = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.container_definition_id_component) = true
  ]; // The reusable container definition that this instance realizes.

  common.v1.ResourceStatus status = 6 [(buf.validate.field).enum.defined_only = true]; // Operational status such as available, disabled, or faulted.

  ContainerLocation location = 7; // Dynamic location of the container instance.

  common.v1.CustomProperties custom = 8; // Extension point for instance-specific data.
}

message ContainerInstances {
  repeated ContainerInstance items = 1; // List wrapper used for transport/query responses.
}
