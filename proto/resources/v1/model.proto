syntax = "proto3";
package resources.v1;

import "buf/validate/validate.proto";
import "common/v1/external_references.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Resources.V1";
option go_package = "github.com/cobotar/protocol/messages/resources/v1";

enum ModelGroup {
  MODEL_GROUP_UNSPECIFIED = 0;
  MODEL_GROUP_PRODUCT = 10;
  MODEL_GROUP_SUB_ASSEMBLY = 11;
  MODEL_GROUP_PART = 12;
  MODEL_GROUP_TOOL = 20;
  MODEL_GROUP_ROBOT = 30;
  MODEL_GROUP_CONTAINER = 40;
  MODEL_GROUP_ASSET = 50;
}

enum ModelAssetRole {
  MODEL_ASSET_ROLE_UNSPECIFIED = 0;

  // Preferred asset for runtime loading in clients such as Unity.
  MODEL_ASSET_ROLE_RUNTIME = 1;

  // Original/source CAD or mesh asset imported into the system.
  MODEL_ASSET_ROLE_SOURCE = 2;

  // Converted representation derived from another asset.
  MODEL_ASSET_ROLE_DERIVED = 3;

  // Lower-detail representation used for preview, web viewers, or performance.
  MODEL_ASSET_ROLE_PREVIEW = 4;

  // Collision/physics proxy representation.
  MODEL_ASSET_ROLE_COLLISION = 5;
}

enum ModelAssetFormat {
  MODEL_ASSET_FORMAT_UNSPECIFIED = 0;
  MODEL_ASSET_FORMAT_GLB = 1;
  MODEL_ASSET_FORMAT_GLTF = 2;
  MODEL_ASSET_FORMAT_OBJ = 3;
  MODEL_ASSET_FORMAT_FBX = 4;
  MODEL_ASSET_FORMAT_STL = 5;
  MODEL_ASSET_FORMAT_STEP = 6;
  MODEL_ASSET_FORMAT_IGES = 7;
  MODEL_ASSET_FORMAT_USD = 8;
  MODEL_ASSET_FORMAT_USDZ = 9;
}

enum SidecarAssetFormat {
  SIDECAR_ASSET_FORMAT_UNSPECIFIED = 0;
  SIDECAR_ASSET_FORMAT_MTL = 81;
  SIDECAR_ASSET_FORMAT_BASIS = 82;
  SIDECAR_ASSET_FORMAT_KTX2 = 83;
  SIDECAR_ASSET_FORMAT_ZIP = 84;
}

enum ImageAssetFormat {
  IMAGE_ASSET_FORMAT_UNSPECIFIED = 0;
  IMAGE_ASSET_FORMAT_PNG = 100;
  IMAGE_ASSET_FORMAT_JPEG = 101;
  IMAGE_ASSET_FORMAT_WEBP = 102;
  IMAGE_ASSET_FORMAT_SVG = 103;
}

enum ModelUnit {
  MODEL_UNIT_UNSPECIFIED = 0;

  // Metric
  MODEL_UNIT_MILLIMETER = 1;
  MODEL_UNIT_CENTIMETER = 2;
  MODEL_UNIT_METER = 3;
  MODEL_UNIT_KILOMETER = 4;

  // Imperial
  MODEL_UNIT_INCH = 10;
  MODEL_UNIT_FOOT = 11;
  MODEL_UNIT_YARD = 12;

  // CAD / scientific
  MODEL_UNIT_MICROMETER = 20;
}

enum ModelAxis {
  MODEL_AXIS_UNSPECIFIED = 0;

  MODEL_AXIS_POSITIVE_X = 1;
  MODEL_AXIS_NEGATIVE_X = 2;

  MODEL_AXIS_POSITIVE_Y = 3;
  MODEL_AXIS_NEGATIVE_Y = 4;

  MODEL_AXIS_POSITIVE_Z = 5;
  MODEL_AXIS_NEGATIVE_Z = 6;
}

enum ModelStorageBackend {
  MODEL_STORAGE_BACKEND_UNSPECIFIED = 0;
  MODEL_STORAGE_BACKEND_BUILT_IN = 1;
  MODEL_STORAGE_BACKEND_NATS_OBJECT_STORE = 2;
  MODEL_STORAGE_BACKEND_S3 = 3;
  MODEL_STORAGE_BACKEND_MINIO = 4;
  MODEL_STORAGE_BACKEND_LOCAL_FILE = 5;
  MODEL_STORAGE_BACKEND_EXTERNAL_URL = 6;
}

/*
   Examples:
   asset {
     backend: MODEL_STORAGE_BACKEND_NATS_OBJECT_STORE
     bucket: "cobotar-assets"
     object_key: "models/part-123.obj"
     filename: "bracket.obj"
     content_type: "model/obj"
     size_bytes: 123456
     sha256: "..."
   }
   thumbnail {
     backend: MODEL_STORAGE_BACKEND_NATS_OBJECT_STORE
     bucket: "cobotar-assets"
     object_key: "thumbnails/part-123.png"
     filename: "bracket.png"
     content_type: "image/png"
   }

   asset {
     backend: MODEL_STORAGE_BACKEND_BUILT_IN
     filename: "models/robot_ur5e.glb"
     content_type: "model/gltf-binary"
   }
*/
message FileLocation {
  option (buf.validate.message).cel = {
    id: "asset_location.backend_location"
    message: "asset location must match storage backend"
    expression: "(this.backend == 1 && this.filename != '') || (this.backend in [2, 3, 4] && this.bucket != '' && this.object_key != '') || (this.backend == 5 && this.filename != '') || (this.backend == 6 && this.uri != '')"
  };

  ModelStorageBackend backend = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  string bucket = 2;
  string object_key = 3; // storage identifier

  string uri = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uri = true
  ];

  string filename = 5; // original/display/download filename
  string content_type = 6; // Examples: MODEL_ASSET_FORMAT_GLB → model/gltf-binary, MODEL_ASSET_FORMAT_GLTF → model/gltf+json, MODEL_ASSET_FORMAT_OBJ → model/obj or text/plain, MODEL_ASSET_FORMAT_STL → model/stl, MODEL_ASSET_FORMAT_STEP → model/step, IMAGE_ASSET_FORMAT_PNG → image/png, IMAGE_ASSET_FORMAT_JPEG → image/jpeg, IMAGE_ASSET_FORMAT_WEBP → image/webp, ASSET_FORMAT_ZIP → application/zip,
  uint64 size_bytes = 7;

  string sha256 = 8 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.pattern = "^[a-fA-F0-9]{64}$"
  ];
}

message ModelAssetRef {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.model_asset_id_component) = true
  ];
  FileLocation location = 2 [(buf.validate.field).required = true];

  ModelAssetFormat format = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  // Unit used for the model geometry coordinates.
  // Typically "mm", "cm", "m", "in", etc.
  // Used to scale the model correctly when loading.
  ModelUnit unit = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  // Defines which axis is "up" in the source asset coordinate system.
  // Examples: Unity: Y, Blender: Z, many CAD systems: Z
  ModelAxis up_axis = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  // Defines which axis is "forward" in the source asset coordinate system.
  // Examples: Unity: Z, Blender: -Y, many CAD systems: X/Y
  ModelAxis forward_axis = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  ModelAssetRole role = 7 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  // Optional link to the source asset this asset was generated from.
  // Example: a runtime GLB can point to the original imported OBJ/STEP asset.
  string derived_from_asset_id = 8 [(buf.validate.field).string.(validation.v1.model_asset_id_component) = true];

  option (buf.validate.message).cel = {
    id: "model_asset_ref.axes_different"
    message: "up_axis and forward_axis must be different"
    expression: "this.up_axis != this.forward_axis"
  };

  option (buf.validate.message).cel = {
    id: "model_asset_ref.derived_has_source"
    message: "derived model assets must define derived_from_asset_id"
    expression: "this.role != 3 || this.derived_from_asset_id != ''"
  };

  option (buf.validate.message).cel = {
    id: "model_asset_ref.no_self_derivation"
    message: "derived_from_asset_id must not reference the asset itself"
    expression: "this.derived_from_asset_id == '' || this.derived_from_asset_id != this.id"
  };
}

message ImageAssetRef {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.image_asset_id_component) = true
  ];
  FileLocation location = 2 [(buf.validate.field).required = true];

  ImageAssetFormat format = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  // Optional link to the model asset this image was generated from.
  // Example: a PNG thumbnail can point to the GLB/OBJ it previews.
  string derived_from_model_asset_id = 4 [(buf.validate.field).string.(validation.v1.model_asset_id_component) = true];
}

message SidecarAssetRef {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.sidecar_asset_id_component) = true
  ];
  FileLocation location = 2 [(buf.validate.field).required = true];

  SidecarAssetFormat format = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  // Optional link to the model asset this sidecar belongs to or was generated from.
  // Example: an MTL can point to the OBJ it describes; a KTX2 texture can point to a GLB.
  string associated_model_asset_id = 4 [(buf.validate.field).string.(validation.v1.model_asset_id_component) = true];
}

message ModelArtifact {
  string id = 1 [(buf.validate.field).string.(validation.v1.model_id_component) = true];
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true];
  string icon = 3;
  string description = 4;
  ModelGroup group = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  ModelAssetRef asset = 6 [(buf.validate.field).required = true]; // Primary loadable model asset.
  ImageAssetRef thumbnail = 7; // Optional preview image.
  repeated ModelAssetRef alternatives = 8; // Source, derived, preview, or collision model assets.
  repeated SidecarAssetRef sidecars = 9;
  string version = 10;
  repeated common.v1.ExternalReference external_references = 11;

  option (buf.validate.message).cel = {
    id: "model_artifact.primary_asset_role"
    message: "primary asset must have runtime role"
    expression: "this.asset.role in [1, 2]" // Runtime or Source
  };
}

message ModelArtifacts {
  repeated ModelArtifact items = 1;
}
