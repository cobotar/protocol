syntax = "proto3";
package resources.v1;

import "buf/validate/validate.proto";
import "common/v1/custom_properties.proto";
import "common/v1/key_value_constraint.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Resources.V1";
option go_package = "github.com/cobotar/protocol/messages/resources/v1";

enum ValidationMode {
  VALIDATION_MODE_UNSPECIFIED = 0;
  VALIDATION_MODE_PRESENCE_CHECK = 1;
  VALIDATION_MODE_POSE_CHECK = 2;
  VALIDATION_MODE_FASTENER_CHECK = 3;
  VALIDATION_MODE_LABEL_CHECK = 4;
  VALIDATION_MODE_SURFACE_CHECK = 5;
}

message VisionCapability {
  repeated ValidationMode supported_validation_modes = 1;
  repeated string supported_part_definition_ids = 2;
  repeated common.v1.KeyValueConstraint constraints = 3;
}

enum AssetType {
  ASSET_TYPE_UNSPECIFIED = 0;
  ASSET_TYPE_CAMERA = 1; // Vision device used for inspection, guidance, or detection.
  ASSET_TYPE_LIGHT = 2; // Lighting device such as ring light, spot light, or backlight.
  ASSET_TYPE_CONVEYOR = 3; // Conveying device used to move workpieces or pallets between areas.
  ASSET_TYPE_SENSOR = 4; // Generic sensor asset such as prox sensor, load cell, scanner, or IO sensor.
  ASSET_TYPE_HMI = 5; // Human-machine interface such as touch panel, button box, or stack-light UI endpoint.
  ASSET_TYPE_PART_FEEDER = 8; // Feeder/presentation device used to supply parts in a controlled way.
}

enum AssetDriverType {
  ASSET_DRIVER_TYPE_UNSPECIFIED = 0;
  ASSET_DRIVER_TYPE_DEFAULT = 1;
}

message AssetDefinition {
  option (buf.validate.message).cel = {
    id: "asset_type_camera_requires_vision_capability"
    message: "vision capability must be set when type is camera"
    expression: "this.type != 1 || has(this.vision)"
  };

  string id = 1;
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true]; // Name of the asset
  string icon = 3; // Optional icon representing the asset
  string description = 4; // Optional description of the asset
  AssetType type = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true,
    (buf.validate.field).enum.example = 1 // ASSET_TYPE_CAMERA
  ];
  AssetDriverType driver_type = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  string model_id = 7 [(buf.validate.field).string.(validation.v1.model_id_component) = true];
  VisionCapability vision = 8;
  common.v1.CustomProperties custom = 9;
  // TODO: add ToolRole or similar way to express capabilities?
}

message AssetDefinitions {
  repeated AssetDefinition items = 1;
}
