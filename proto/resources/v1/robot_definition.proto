syntax = "proto3";
package resources.v1;

import "buf/validate/validate.proto";
import "capability/v1/capability_profile.proto";
import "common/v1/custom_properties.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Resources.V1";
option go_package = "github.com/cobotar/protocol/messages/resources/v1";

enum RobotType {
  ROBOT_TYPE_UNSPECIFIED = 0;
  ROBOT_TYPE_UR3E = 10;
  ROBOT_TYPE_UR5E = 11;
  ROBOT_TYPE_UR10E = 12;
  ROBOT_TYPE_KUKA_IIWA = 20;
}

enum RobotDriverType {
  ROBOT_DRIVER_TYPE_UNSPECIFIED = 0;
  ROBOT_DRIVER_TYPE_UR = 1;
  ROBOT_DRIVER_TYPE_GENERIC = 2;
}

message RobotDefinition {
  string id = 1; // Autogenerated id
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true]; // Name of the robot
  string icon = 3; // Optional icon representing the robot
  string description = 4; // Optional description of the robot
  RobotType type = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ]; // Required type of robot
  RobotDriverType driver_type = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ]; // Required driver type for robot
  string model_id = 7 [(buf.validate.field).string.(validation.v1.model_id_component) = true];

  // Tool mounting capability
  string coupler_model_id = 8 [(buf.validate.field).string.(validation.v1.model_id_component) = true];
  repeated string supported_tool_definition_ids = 9;
  string default_tool_definition_id = 10;
  int32 tool_slots = 11 [(buf.validate.field).int32.gte = 0];

  capability.v1.CapabilityProfile capability_profile = 12;
  common.v1.CustomProperties custom = 13;
}

message RobotDefinitions {
  repeated RobotDefinition items = 1;
}
