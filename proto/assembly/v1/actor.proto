syntax = "proto3";
package assembly.v1;

import "assembly/v1/common.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Messages.Assembly.V1";
option go_package = "github.com/cobotar/protocol/messages/assembly/v1";

message WorkerDefinition {
  string id = 1;
  string name = 2;
  string description = 3;
  string icon = 4;
  bool disabled = 5;
  string employee_id = 6;
  repeated ExternalReference external_references = 7;
  CustomProperties custom = 8;
}

message ActorRef {
  ActorKind kind = 1;
  string actor_id = 2; // worker_definition_id or robot_instance_id
}

message ActorAssignment {
  string id = 1;
  ActorRef actor = 2;
  string process_run_id = 3;
  string sequence_run_id = 4;
  string task_run_id = 5;
  google.protobuf.Timestamp assigned_at = 6;
  google.protobuf.Timestamp released_at = 7;
}
