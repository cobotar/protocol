syntax = "proto3";
package assembly.v1;

import "ar/v1/property.proto";
import "geometry/v1/pose.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Messages.Assembly.V1";
option go_package = "github.com/cobotar/protocol/messages/assembly/v1";

message Ref {
  string id = 1;
}

message NamedRef {
  string id = 1;
  string name = 2;
}

enum ActorKind {
  ACTOR_KIND_UNSPECIFIED = 0;
  ACTOR_KIND_HUMAN = 1;
  ACTOR_KIND_ROBOT = 2;
  ACTOR_KIND_HYBRID = 3;
}

enum ResourceStatus {
  RESOURCE_STATUS_UNSPECIFIED = 0;
  RESOURCE_STATUS_AVAILABLE = 1;
  RESOURCE_STATUS_UNAVAILABLE = 2;
  RESOURCE_STATUS_DISABLED = 3;
  RESOURCE_STATUS_MAINTENANCE = 4;
}

enum SafetyRelevance {
  SAFETY_RELEVANCE_UNSPECIFIED = 0;
  SAFETY_RELEVANCE_LOW = 1;
  SAFETY_RELEVANCE_MEDIUM = 2;
  SAFETY_RELEVANCE_HIGH = 3;
  SAFETY_RELEVANCE_CRITICAL = 4;
}

enum CollaborationMode {
  COLLABORATION_MODE_UNSPECIFIED = 0;
  COLLABORATION_MODE_HUMAN_ONLY = 1;
  COLLABORATION_MODE_ROBOT_ONLY = 2;
  COLLABORATION_MODE_SEQUENTIAL_HRC = 3;
  COLLABORATION_MODE_SIMULTANEOUS_HRC = 4;
}

enum ConstraintOperator {
  CONSTRAINT_OPERATOR_UNSPECIFIED = 0;
  CONSTRAINT_OPERATOR_EQ = 1;
  CONSTRAINT_OPERATOR_NEQ = 2;
  CONSTRAINT_OPERATOR_GT = 3;
  CONSTRAINT_OPERATOR_GTE = 4;
  CONSTRAINT_OPERATOR_LT = 5;
  CONSTRAINT_OPERATOR_LTE = 6;
  CONSTRAINT_OPERATOR_IN = 7;
  CONSTRAINT_OPERATOR_NOT_IN = 8;
}

message KeyValueConstraint {
  string key = 1;
  ConstraintOperator op = 2;
  string value = 3;
  repeated string values = 4;
}

message TimeWindow {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
}

message LocalTarget {
  string anchor_id = 1;
  geometry.v1.Pose offset = 2;
}

message EstimatedDuration {
  google.protobuf.Duration nominal = 1;
  google.protobuf.Duration min = 2;
  google.protobuf.Duration max = 3;
}

message DisplayText {
  string title = 1;
  string description = 2;
  string operator_instruction = 3;
}

message ExternalReference {
  string system = 1;
  string external_id = 2;
  string url = 3;
}

message CustomProperties {
  repeated ar.v1.Property properties = 1;
}
