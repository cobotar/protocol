message CapabilityProfile {
  double min_force_n = 1;
  double max_force_n = 2;
  double min_torque_nm = 3;
  double max_torque_nm = 4;
  double repeatability_mm = 5;
  double max_payload_g = 6;
  double min_grip_width_mm = 7;
  double max_grip_width_mm = 8;
  repeated KeyValueConstraint constraints = 9;
}

message ToolDefinition {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  ToolType type = 5;
  ActorKind actor_kind = 6;
  repeated ToolRole roles = 7;
  repeated ToolProperty properties = 8;
  CapabilityProfile capability_profile = 9;
  string model_id = 10;
  repeated ExternalReference external_references = 11;
  CustomProperties custom = 12;
}

message ToolDefinitions {
  repeated ToolDefinition items = 1;
}

message ToolInstance {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  string tool_definition_id = 5;
  string serial_number = 6;
  string station_id = 7;
  ResourceStatus status = 8;
  bool calibrated = 9;
  google.protobuf.Timestamp calibration_valid_until = 10;
  geometry.v1.LocalizedPose pose = 11;
  CustomProperties custom = 12;
}

message ToolInstances {
  repeated ToolInstance items = 1;
}

// ContainerSlotDefinition describes one addressable place inside a container.
//
// A slot is the thing that operators, robots, and AR guidance normally target.
// Examples:
// - a shelf bin in storage
// - a logical slot in a kit
// - a tray pocket
// - a fixture nest / clamp position / pallet pocket
message ContainerSlotDefinition {
  string id = 1; // Stable identifier unique within the parent container definition.
  string name = 2; // Human-readable slot name shown in UI and AR, e.g. "Slot A" or "Motor Nest".
  string icon = 3; // Optional icon override for UIs. If empty, the container icon may be reused.
  string description = 4; // Optional longer description of the slot's purpose or usage constraints.

  geometry.v1.Pose pose = 5; // Pose of the slot relative to the container definition coordinate frame.
  geometry.v1.Vector3 size = 6; // Optional approximate slot extents/bounds, useful for UI, AR, and planning.

  ContainerSlotType type = 7; // Semantic role of the slot, e.g. storage bin, kit slot, tray cell, or fixture slot.

  repeated string supported_product_definition_ids = 8; // Products that this slot explicitly supports holding/presenting.
  repeated string supported_root_part_definition_ids = 9; // Root assemblies/root parts that this slot supports.
  repeated string supported_part_definition_ids = 10; // Specific part definitions that this slot supports.

  repeated KeyValueConstraint constraints = 11; // Additional semantic/compatibility constraints such as orientation, handedness, or required variants.
  CustomProperties custom = 12; // Extension point for domain-specific slot data.
}

// ContainerDefinition describes a physical holder/carrier with one or more slots.
//
// This unifies what used to be modeled separately as fixtures, kit trays, storage
// bins, and trays/totes. The semantic differences are captured by ContainerType and
// ContainerSlotType rather than by separate top-level resources.
message ContainerDefinition {
  string id = 1; // Stable identifier of the reusable container definition.
  string name = 2; // Display name, e.g. "Shelf Bin 01", "Starter Kit Tray", or "Motor Pallet".
  string icon = 3; // UI icon representing the container.
  string description = 4; // Human-readable description of the container's purpose.

  ContainerType type = 5; // High-level category: storage, kit, tray, or fixture.
  string model_id = 6; // Optional 3D model used in simulation, AR, and UI rendering.

  repeated ContainerSlotDefinition slots = 7; // Addressable places inside/on the container.

  repeated KeyValueConstraint constraints = 8; // Container-level constraints applying to the whole carrier.
  CustomProperties custom = 9; // Extension point for domain-specific container metadata.
}

message ContainerDefinitions {
  repeated ContainerDefinition items = 1; // List wrapper used for transport/query responses.
}

// ContainerInstance represents a concrete container in a station/cell.
//
// Examples:
// - the actual shelf bin mounted in station A
// - the actual pallet currently loaded on an indexing table
// - the actual jig installed on a workbench
message ContainerInstance {
  string id = 1; // Stable identifier of the concrete container instance.
  string name = 2; // Display name of the instance. Often copied from the definition, but may be station-specific.
  string icon = 3; // UI icon for the instance.
  string description = 4; // Human-readable description of this particular instance.

  string container_definition_id = 5; // The reusable container definition that this instance realizes.
  string station_id = 6; // Station/cell where this container currently belongs or is mounted.
  ResourceStatus status = 7; // Operational status such as available, disabled, or faulted.
  geometry.v1.LocalizedPose pose = 8; // Pose of the container instance in the station/environment.

  CustomProperties custom = 9; // Extension point for instance-specific data.
}

message ContainerInstances {
  repeated ContainerInstance items = 1; // List wrapper used for transport/query responses.
}

enum RobotType {
  ROBOT_TYPE_UNSPECIFIED = 0;
  ROBOT_TYPE_UR3E = 10;
  ROBOT_TYPE_UR5E = 11;
  ROBOT_TYPE_UR10E = 12;
  ROBOT_TYPE_KUKA_IIWA = 20;
}

enum RobotDriverType {
  ROBOT_DRIVER_TYPE_UNSPECIFIED = 0;
  ROBOT_DRIVER_TYPE_UR = 1;
  ROBOT_DRIVER_TYPE_GENERIC = 2;
}

message RobotDefinition {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  RobotType type = 5;
  RobotDriverType driver_type = 6;
  string model_id = 7;

  // Tool mounting capability
  string coupler_model_id = 8;
  repeated string supported_tool_definition_ids = 9;
  string default_tool_definition_id = 10;
  int32 tool_slots = 11;

  CapabilityProfile capability_profile = 12;
  CustomProperties custom = 13;
}

message RobotDefinitions {
  repeated RobotDefinition items = 1;
}

message RobotInstance {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  string robot_definition_id = 5;
  string station_id = 6;
  string mounted_tool_instance_id = 7; // The tool instance currently mounted on the robot, if any.
  repeated string available_tool_instance_ids = 8; // Tool instances available to this robot in the cell/tool dock/tool magazine.
  bool supports_tool_change = 9; // Whether this robot instance can dynamically change between available tools.
  ResourceStatus status = 10;
  geometry.v1.LocalizedPose base_pose = 11;
  CustomProperties custom = 12;
}

message RobotInstances {
  repeated RobotInstance items = 1;
}

enum AssetType {
