syntax = "proto3";
package assembly.v1;

import "assembly/v1/common.proto";
import "geometry/v1/pose.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Messages.Assembly.V1";
option go_package = "github.com/cobotar/protocol/messages/assembly/v1";

enum ToolType {
  TOOL_TYPE_UNSPECIFIED = 0;
  TOOL_TYPE_FASTENING = 1;
  TOOL_TYPE_GRIPPING = 2;
  TOOL_TYPE_CUTTING = 3;
  TOOL_TYPE_MEASURING = 4;
  TOOL_TYPE_POSITIONING = 5;
  TOOL_TYPE_DISPENSING = 6;
  TOOL_TYPE_INSPECTION = 7;
  TOOL_TYPE_SAFETY = 8;
  TOOL_TYPE_ELECTRONICS = 9;
  TOOL_TYPE_FIXTURE_ACCESSORY = 10;
  TOOL_TYPE_SHAPING = 11;
  TOOL_TYPE_TURNING = 12;
  TOOL_TYPE_STRIKING = 13;
  TOOL_TYPE_MARKING = 14;
  TOOL_TYPE_FINISHING = 15;
  TOOL_TYPE_ABRASIVE = 16;
  TOOL_TYPE_CLEANING = 17;
}

enum ToolRole {
  TOOL_ROLE_UNSPECIFIED = 0;
  TOOL_ROLE_GRIP_WORKPIECE = 1;
  TOOL_ROLE_POSITION_COMPONENT = 2;
  TOOL_ROLE_ALIGN_COMPONENT = 3;
  TOOL_ROLE_APPLY_TORQUE = 4;
  TOOL_ROLE_APPLY_LINEAR_FORCE = 5;
  TOOL_ROLE_MEASURE_DIMENSION = 6;
  TOOL_ROLE_DETECT_PRESENCE = 7;
  TOOL_ROLE_DISPENSE_MATERIAL = 8;
  TOOL_ROLE_EXECUTE_MOTION = 9;
  TOOL_ROLE_SAFETY_INTERACTION = 10;
  TOOL_ROLE_HANDLE_ESD = 11;
  TOOL_ROLE_VISUAL_INSPECTION = 12;
  TOOL_ROLE_WIPE_CLEAN = 13;
}

enum ToolProperty {
  TOOL_PROPERTY_UNSPECIFIED = 0;
  TOOL_PROPERTY_TORQUE_CONTROLLED = 1;
  TOOL_PROPERTY_ESD_SAFE = 2;
  TOOL_PROPERTY_INSULATED = 3;
  TOOL_PROPERTY_COLLABORATIVE_SAFE = 4;
  TOOL_PROPERTY_CALIBRATED = 5;
  TOOL_PROPERTY_QUICK_CHANGE = 6;
}

message CapabilityProfile {
  double min_force_n = 1;
  double max_force_n = 2;
  double min_torque_nm = 3;
  double max_torque_nm = 4;
  double repeatability_mm = 5;
  double max_payload_g = 6;
  double min_grip_width_mm = 7;
  double max_grip_width_mm = 8;
  repeated KeyValueConstraint constraints = 9;
}

message ToolDefinition {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  ToolType type = 5;
  ActorKind actor_kind = 6;
  repeated ToolRole roles = 7;
  repeated ToolProperty properties = 8;
  CapabilityProfile capability_profile = 9;
  string model_id = 10;
  repeated ExternalReference external_references = 11;
  CustomProperties custom = 12;
}

message ToolDefinitions {
  repeated ToolDefinition items = 1;
}

message ToolInstance {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  string tool_definition_id = 5;
  string serial_number = 6;
  string station_id = 7;
  ResourceStatus status = 8;
  bool calibrated = 9;
  google.protobuf.Timestamp calibration_valid_until = 10;
  geometry.v1.LocalizedPose pose = 11;
  CustomProperties custom = 12;
}

message ToolInstances {
  repeated ToolInstance items = 1;
}

enum FixtureType {
  FIXTURE_TYPE_UNSPECIFIED = 0;
  FIXTURE_TYPE_BASE = 1;
  FIXTURE_TYPE_CLAMP = 2;
  FIXTURE_TYPE_JIG = 3;
  FIXTURE_TYPE_PALLET = 4;
}

message FixtureDefinition {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  FixtureType type = 5;
  repeated string supported_product_definition_ids = 6; // This is a capability/compatibility declaration, e.g. fixture-1 supports product A and B
  repeated string supported_root_part_definition_ids = 7; // This fixture support products whose root assembly is one of these root parts
  string model_id = 8;
  repeated KeyValueConstraint constraints = 9;
  CustomProperties custom = 10;
}

message FixtureDefinitions {
  repeated FixtureDefinition items = 1;
}

message FixtureInstance {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  string fixture_definition_id = 5;
  string station_id = 6;
  ResourceStatus status = 7;
  geometry.v1.LocalizedPose pose = 8;
  CustomProperties custom = 9;
}

message FixtureInstances {
  repeated FixtureInstance items = 1;
}

enum RobotType {
  ROBOT_TYPE_UNSPECIFIED = 0;
  ROBOT_TYPE_UR3E = 10;
  ROBOT_TYPE_UR5E = 11;
  ROBOT_TYPE_UR10E = 12;
  ROBOT_TYPE_KUKA_IIWA = 20;
}

enum RobotDriverType {
  ROBOT_DRIVER_TYPE_UNSPECIFIED = 0;
  ROBOT_DRIVER_TYPE_UR = 1;
  ROBOT_DRIVER_TYPE_GENERIC = 2;
}

message RobotDefinition {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  RobotType type = 5;
  RobotDriverType driver_type = 6;
  string model_id = 7;

  // Tool mounting capability
  string coupler_model_id = 8;
  repeated string supported_tool_definition_ids = 9;
  string default_tool_definition_id = 10;
  int32 tool_slots = 11;

  CapabilityProfile capability_profile = 12;
  CustomProperties custom = 13;
}

message RobotDefinitions {
  repeated RobotDefinition items = 1;
}

message RobotInstance {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  string robot_definition_id = 5;
  string station_id = 6;
  string mounted_tool_instance_id = 7; // what is attached right now
  repeated string available_tool_instance_ids = 8; // what is in the cell/magazine/dock and usable
  bool supports_tool_change = 9; // whether dynamic switching is allowed
  ResourceStatus status = 10;
  geometry.v1.LocalizedPose base_pose = 11;
  CustomProperties custom = 12;
}

message RobotInstances {
  repeated RobotInstance items = 1;
}

enum AssetType {
  ASSET_TYPE_UNSPECIFIED = 0;
  ASSET_TYPE_CAMERA = 1;
  ASSET_TYPE_LIGHT = 2;
  ASSET_TYPE_CONVEYOR = 3;
  ASSET_TYPE_SENSOR = 4;
  ASSET_TYPE_HMI = 5;
}

enum AssetDriverType {
  ASSET_DRIVER_TYPE_UNSPECIFIED = 0;
  ASSET_DRIVER_TYPE_DEFAULT = 1;
}

message AssetDefinition {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  AssetType type = 5;
  AssetDriverType driver_type = 6;
  string model_id = 7;
  CustomProperties custom = 8;
}

message AssetDefinitions {
  repeated AssetDefinition items = 1;
}

message AssetInstance {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  string asset_definition_id = 5;
  string station_id = 6;
  ResourceStatus status = 7;
  geometry.v1.LocalizedPose pose = 8;
  CustomProperties custom = 9;
}

message AssetInstances {
  repeated AssetInstance items = 1;
}
