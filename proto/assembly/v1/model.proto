syntax = "proto3";
package assembly.v1;

import "assembly/v1/common.proto";
import "buf/validate/validate.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Assembly.V1";
option go_package = "github.com/cobotar/protocol/messages/assembly/v1";

enum ModelGroup {
  MODEL_GROUP_UNSPECIFIED = 0;
  MODEL_GROUP_PART = 1;
  MODEL_GROUP_PRODUCT = 2;
  MODEL_GROUP_TOOL = 3;
  MODEL_GROUP_ROBOT = 4;
  MODEL_GROUP_CONTAINER = 5;
  MODEL_GROUP_ASSET = 6;
}

enum ModelOrigin {
  MODEL_ORIGIN_UNSPECIFIED = 0;
  MODEL_ORIGIN_BUILT_IN = 1;
  MODEL_ORIGIN_UPLOADED = 2;
  MODEL_ORIGIN_EXTERNAL = 3;
}

enum ModelFormat {
  MODEL_FORMAT_UNSPECIFIED = 0;
  MODEL_FORMAT_GLB = 1;
  MODEL_FORMAT_GLTF = 2;
  MODEL_FORMAT_OBJ = 3;
  MODEL_FORMAT_STEP = 4;
  MODEL_FORMAT_STL = 5;
  MODEL_FORMAT_USDZ = 6;
}

message ModelArtifact {
  string id = 1;
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true];
  string description = 3;
  string icon = 4;
  ModelGroup group = 5 [(buf.validate.field).enum.defined_only = true];
  ModelOrigin origin = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  ModelFormat format = 7 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];

  // Filename is required for BUILT_IN models, ignored otherwise
  string filename = 8;

  // Uri is required for uploaded and external models
  string uri = 9 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uri = true
  ];

  string thumbnail_uri = 10 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uri = true
  ];

  string version = 11;

  // Unit used for the model geometry coordinates.
  // Typically "mm", "cm", "m", "in", etc.
  // Used to scale the model correctly when loading.
  string unit = 12;
  string up_axis = 13; // "X", "Y", "Z"
  repeated ExternalReference external_references = 14;
  CustomProperties custom = 15;
}

message ModelArtifacts {
  repeated ModelArtifact items = 1;
}
