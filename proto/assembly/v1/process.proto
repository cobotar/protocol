syntax = "proto3";
package assembly.v1;

import "assembly/v1/common.proto";
import "assembly/v1/resources.proto";
import "assembly/v1/skill.proto";
import "assembly/v1/variant.proto";
import "geometry/v1/vector3.proto";

option csharp_namespace = "Messages.Assembly.V1";
option go_package = "github.com/cobotar/protocol/messages/assembly/v1";

enum ProcessType {
  PROCESS_TYPE_UNSPECIFIED = 0;
  PROCESS_TYPE_ASSEMBLY = 1; // Example: build gearbox
  PROCESS_TYPE_DISASSEMBLY = 2; // Example: take mould apart for maintenance
  PROCESS_TYPE_INSPECTION = 3; // Example: QC Check
  PROCESS_TYPE_CHECKLIST = 4; // Example: line startup
  PROCESS_TYPE_KITTING = 5; // Example: prepare parts kit
  PROCESS_TYPE_MAINTENANCE = 6; // Example: replace filter
}

enum SequenceOperator {
  SEQUENCE_OPERATOR_UNSPECIFIED = 0;
  SEQUENCE_OPERATOR_ALL_OF_CHILDREN = 1;
  SEQUENCE_OPERATOR_ONE_OF_CHILDREN = 2;
  SEQUENCE_OPERATOR_ORDERED = 3;
}

enum TaskType {
  TASK_TYPE_UNSPECIFIED = 0;
  TASK_TYPE_INSPECT = 1;
  TASK_TYPE_FASTEN = 2;
  TASK_TYPE_UNFASTEN = 3;
  TASK_TYPE_MOUNT = 4;
  TASK_TYPE_UNMOUNT = 5;
  TASK_TYPE_MOVE = 6;
  TASK_TYPE_REMOVE = 7;
  TASK_TYPE_APPLY = 8;
  TASK_TYPE_WIPE = 9;
  TASK_TYPE_ALIGN = 10;
  TASK_TYPE_INSERT = 11;
  TASK_TYPE_HOLD = 12;
  TASK_TYPE_VERIFY = 13;
  TASK_TYPE_PICK = 14;
  TASK_TYPE_PLACE = 15;
  TASK_TYPE_SCAN = 16;
  TASK_TYPE_WAIT = 17;
  TASK_TYPE_CHECK = 18;
  TASK_TYPE_ACKNOWLEDGE = 19;
  // Start, stop, reset, open, close,
}

enum TaskAssignmentPreference {
  TASK_ASSIGNMENT_PREFERENCE_UNSPECIFIED = 0;
  TASK_ASSIGNMENT_PREFERENCE_PREFER_HUMAN = 1;
  TASK_ASSIGNMENT_PREFERENCE_ONLY_HUMAN = 2;
  TASK_ASSIGNMENT_PREFERENCE_PREFER_ROBOT = 3;
  TASK_ASSIGNMENT_PREFERENCE_ONLY_ROBOT = 4; // Only use this if it truly must be done by a robot. Otherwise use prefer-robot
  TASK_ASSIGNMENT_PREFERENCE_EITHER = 5;
}

message RecipeApplicability {
  repeated VariantRule include = 1; // Recipe applies if any include rule matches. Empty means generally applicable.
  repeated VariantRule exclude = 2; // Recipe is rejected if any exclude rule matches.
}

// ProcessRecipe describes the following:
// - What work must be done
// - What kinds of capabilities are required
// - What tool roles are required
// - What skills are required
// - What actor constrains exist
// - What validation is needed
message ProcessRecipe {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  ProcessType type = 5;
  string product_definition_id = 6;
  RecipeApplicability applicability = 7;
  string root_sequence_id = 8;
  repeated SequenceDefinition sequences = 9;
  repeated TaskDefinition tasks = 10;
  repeated string supported_container_definition_ids = 11; // Containers (typically fixture/pallet definitions) that this recipe is intended to run with.
  repeated ExternalReference external_references = 12;
  CustomProperties custom = 13;
}

message SequenceDefinition {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  int32 sequence_number = 5;
  string parent_sequence_id = 6;
  SequenceOperator operator = 7;
  repeated string child_sequence_ids = 8;
  repeated string child_task_ids = 9;
  LocalTarget local_target = 10;
  bool optional = 11;
  bool can_bulk_complete = 12;
  CustomProperties custom = 13;
}

message TaskTarget {
  string target_node_id = 1; // Optional target assembly node when the task acts on a product structure occurrence.
  string target_part_definition_id = 2; // Optional denormalized helper for UIs, planning, and filtering.
  LocalTarget local_target = 3; // Optional pose/anchor relative to the chosen target reference.

  // Optional non-product targets.
  // These are useful when a task is not primarily about an AssemblyNode.
  // Examples:
  // - asset_instance_id     -> check camera, read HMI, inspect feeder
  // - robot_instance_id     -> move robot to home, inspect robot state
  // - station_id            -> clear work surface, perform station startup step
  // - container_instance_id -> interact with a specific pallet, jig, tray, or storage bin
  string asset_instance_id = 4; // Optional asset target such as camera, HMI, sensor, conveyor, or feeder.
  string robot_instance_id = 5; // Optional robot target for robot-specific actions.
  string station_id = 6; // Optional station target for station-level or area-level actions.
  string container_instance_id = 7; // Optional container target such as storage bin, kit, tray, pallet, clamp, or jig.

  ContainerSlotRef location = 8; // Optional slot-level target when a task acts on a specific addressable place in a container.
}

message ValidationRequirement {
  bool require_tool_feedback = 1;
  bool require_vision_check = 2;
  bool allow_manual_confirmation = 3;
  SkillLevel manual_confirmation_min_level = 4;
  repeated KeyValueConstraint constraints = 5;
}

message TaskExecutionPolicy {
  TaskAssignmentPreference assignment_preference = 1;
  ActorConstraint actor_constraint = 2;
  bool can_reassign = 3;
  bool can_do = 4;
  bool can_undo = 5;
  EstimatedDuration estimated_duration = 6;
}

message TaskOverride {
  repeated VariantRule when = 1;
  string instruction_text = 2;
  string target_node_id = 3;
  geometry.v1.Vector3 approach = 4;
}

message TaskDefinition {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  string instruction_text = 5; // Human-readable instruction shown to the operator or author.
  int32 sequence_number = 6; // Ordering hint within the parent sequence.
  TaskType task_type = 7; // The semantic action to perform, e.g. FASTEN, PICK, PLACE, VERIFY.
  TaskTarget target = 8; // The primary thing/location/resource this task acts on.
  geometry.v1.Vector3 approach = 9; // Optional approach direction for AR guidance, picking, insertion, or robot planning.
  //repeated string precondition_task_ids = 10;
  // repeated string dependant_task_ids = 11;
  repeated ToolRequirement tool_requirements = 12; // Tools or tool roles needed to perform the task.
  repeated SkillRequirement skill_requirements = 13; // Skills/qualifications needed by the acting human/robot.
  ValidationRequirement validation = 14; // How task completion should be confirmed or validated.
  TaskExecutionPolicy execution_policy = 15; // Assignment preferences and execution permissions.
  SafetyRelevance safety_relevance = 16; // Safety significance of the task.
  string source_node_id = 17; // Optional source assembly node when something is moved/picked from a product structure.
  string destination_node_id = 18; // Optional destination assembly node when something is moved/placed into a product structure.

  ContainerSlotRef source_location = 19; // Optional source slot for kitting, pick/place, storage, tray, pallet, or fixture operations.
  ContainerSlotRef destination_location = 20; // Optional destination slot for kitting, pick/place, storage, tray, pallet, or fixture operations.

  CustomProperties custom = 21;
  repeated VariantRule applicability = 22; // Applies if any rule matches. Empty means always applicable.
  repeated TaskOverride overrides = 23;
}
