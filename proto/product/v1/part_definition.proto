syntax = "proto3";
package product.v1;

import "buf/validate/validate.proto";
import "common/v1/external_references.proto";
import "common/v1/key_value_constraint.proto";
import "common/v1/time.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Product.V1";
option go_package = "github.com/cobotar/protocol/messages/product/v1";

enum PartType {
  PART_TYPE_UNSPECIFIED = 0;

  PART_TYPE_COMPONENT = 1; // General mechanical or non-specialized part/component
  PART_TYPE_FASTENER = 2; // Screw, bolt, nut, washer, rivet, insert, clip, etc.
  PART_TYPE_CONSUMABLE = 4; // General consumable used up during assembly or maintenance
  PART_TYPE_LABEL = 5; // Sticker, rating plate, barcode label, warning label, etc.
  PART_TYPE_PACKAGING = 6; // Box, bag, foam insert, tray cover, spacer, etc.
  PART_TYPE_PCB = 7; // Bare or populated printed circuit board
  PART_TYPE_ELECTRONIC_COMPONENT = 8; // LED, resistor, capacitor, IC, connector, relay, fuse, etc.
  PART_TYPE_ELECTRICAL_COMPONENT = 9; // Breaker, terminal block, battery, switch, power supply, wire harness, etc.
  PART_TYPE_CABLE = 10; // Wire, cable, wire set, cable assembly, harness
  PART_TYPE_DISPENSED_MATERIAL = 11; // Grease, glue, sealant, potting compound, solder paste, flux, etc.

  PART_TYPE_FINAL_PRODUCT = 20; // A part that is itself composed of multiple child parts, which together form a product
  PART_TYPE_SUBASSEMBLY = 21; // A part that is itself composed of multiple child parts,
}

message Dimensions {
  double x_mm = 1 [(buf.validate.field).double.gte = 0];
  double y_mm = 2 [(buf.validate.field).double.gte = 0];
  double z_mm = 3 [(buf.validate.field).double.gte = 0];
}

enum MaterialCategory {
  MATERIAL_CATEGORY_UNSPECIFIED = 0;

  MATERIAL_CATEGORY_METAL = 1; // Metals and metal alloys
  MATERIAL_CATEGORY_POLYMER = 2; // Thermoplastics / thermosets
  MATERIAL_CATEGORY_ELASTOMER = 3; // Flexible rubber-like materials
  MATERIAL_CATEGORY_COMPOSITE = 4; // Fiber-reinforced / layered materials
  MATERIAL_CATEGORY_CERAMIC = 5; // Ceramics and similar brittle inorganic materials
  MATERIAL_CATEGORY_GLASS = 6; // Glass and glass-like transparent materials
  MATERIAL_CATEGORY_WOOD = 7; // Wood and wood-derived materials
  MATERIAL_CATEGORY_FOAM = 8; // Cellular / expanded materials
  MATERIAL_CATEGORY_ELECTRONICS_SUBSTRATE = 9; // PCB substrate materials such as FR-4, polyimide, CEM-1, ceramic PCB
  MATERIAL_CATEGORY_CHEMICAL = 10; // Adhesive, grease, sealant, potting compound, coating, flux, etc.

  MATERIAL_CATEGORY_OTHER = 99; // Anything not fitting the categories above
}

// MaterialSpec is meant to capture the engineering material identity of a part.
// name → the material family / type
// grade → the standardized grade or specification
// Examples:
// name: aluminium, grade: 6061-T6
// name: Steel, grade: S355JR
// name: stainless steel, grade: AISI 304
// name: ABS, grade: general purpose
// name: Polycarbonate, grade: PC-110
// name: Nylon, grade: PA6 GF15
// name: TPU, grade: 70 Shore A
message MaterialSpec {
  MaterialCategory category = 1; // Broad material class, e.g. metal, polymer, elastomer
  string name = 2; // Material family, e.g. aluminium, steel, ABS, FR-4, epoxy adhesive
  string grade = 3; // Standard/specification, e.g. 6061-T6, S355JR, AISI 304
}

// PartHandlingProfile captures physical handling constraints that follow the
// part regardless of the process it appears in.
message PartHandlingProfile {
  bool fragile = 1; // Part can be damaged by drops, shocks, bending, crushing, or rough handling.
  bool esd_sensitive = 2; // Part requires electrostatic discharge precautions during handling.
  bool requires_two_hand_lift = 3; // Part is heavy or awkward, but can still be lifted manually by an operator.
  bool requires_lifting_assistance = 4; // Part is heavier than what an operator is allowed or expected to lift manually.
  bool requires_fixture_support = 5; // Part cannot realistically be handled or assembled without fixture support.

  double max_grip_force_n = 6; // Maximum gripping/clamping force that may be applied without damaging the part.
  double max_torque_nm = 7; // Maximum torque that may be applied to the part or its fastening interface.

  repeated common.v1.KeyValueConstraint constraints = 8; // Additional handling constraints not represented by dedicated fields.
}

// PartProcessProfile captures defaults and hints used when generating processes
// involving this part.
message PartProcessProfile {
  common.v1.EstimatedDuration estimated_human_duration = 1; // Default duration estimate for tasks performed by a human.
  common.v1.EstimatedDuration estimated_robot_duration = 2; // Default duration estimate for tasks performed by a robot.
  bool require_full_guidance = 3; // Generated tasks should default to full step-by-step guidance for this part.

  bool inspect_before_assemble = 4; // Generate or recommend inspection before this part is assembled.
  bool inspect_after_disassemble = 5; // Generate or recommend inspection after this part is disassembled.

  // Consumable part to apply before inserting or assembling this part, e.g. grease or lubricant.
  string pre_lubrication_part_id = 6;
  // Consumable part to apply after inserting or assembling this part, e.g. sealant or finishing lubricant.
  string post_lubrication_part_id = 7;
  bool requires_wiping = 8; // Generate or recommend wiping/cleaning tasks for this part.

  repeated common.v1.KeyValueConstraint constraints = 9; // Additional process-generation constraints not represented by dedicated fields.
}

message PartDefinition {
  string id = 1;
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true];
  string icon = 3;
  string description = 4;
  PartType type = 5 [
    // (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ]; // Broad functional/BOM classification of the part
  string subtype = 6; // Optional finer-grained classification, e.g. led, resistor, battery, circuit_breaker, wire_harness, grease
  int64 weight_g = 7 [(buf.validate.field).int64.gte = 0]; // weight in grams
  Dimensions dimensions = 8;
  MaterialSpec material = 9;
  string default_model_id = 10 [(buf.validate.field).string.(validation.v1.model_id_component) = true]; // Can later be extended to: CAD model (STEP), AR model (FBX), and lightweight mesh (OBJ)
  PartHandlingProfile handling = 11;
  PartProcessProfile process = 12;
  repeated common.v1.ExternalReference external_references = 13;
  string version = 15;
}

message PartDefinitions {
  repeated PartDefinition items = 1;
}
