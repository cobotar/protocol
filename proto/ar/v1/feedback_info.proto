syntax = "proto3";
package ar.v1;

import "ar/v1/events.proto";
import "ar/v1/feedback.proto";
import "buf/validate/validate.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.AR.V1";
option go_package = "github.com/cobotar/protocol/messages/ar/v1";

enum FeedbackGroup {
  FEEDBACK_GROUP_UNSPECIFIED = 0;

  // Generic UI and feedback elements not tied to a specific semantic domain.
  FEEDBACK_GROUP_GENERAL = 1;

  // Spatial guidance and task-localized visualizations.
  FEEDBACK_GROUP_SPATIAL = 2;

  // Resource guidance (parts, tools, consumables, assets).
  FEEDBACK_GROUP_RESOURCE = 3;

  // Process flow, task lists, instructions, dependencies, and status.
  FEEDBACK_GROUP_PROCESS = 4;

  // Validation and verification guidance.
  FEEDBACK_GROUP_VALIDATION = 5;

  // Robot awareness and robot intent visualizations.
  FEEDBACK_GROUP_ROBOT = 6;

  // Human-robot collaboration semantics.
  FEEDBACK_GROUP_COLLABORATION = 7;
}

message FeedbackInfoMessage {
  string name = 2 [(buf.validate.field).string.(validation.v1.name_component) = true];
  string icon = 3;
  string description = 4;
  FeedbackType type = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  FeedbackGroup group = 6 [(buf.validate.field).enum.defined_only = true];
  bool require_agent = 7;
  bool require_frame = 8;
  repeated ExchangeType consumers_required = 9; // Inputs the feedback expects to receive
  repeated ExchangeType consumers_optional = 10; // Inputs that will enhance the feedback, but not needed to function
  repeated HandlerRequirement required_handlers = 11; // Events that MUST have at least one handler somewhere else in the system. (i.e., if the feedback emits these, it expects the environment to react)
  repeated ExchangeType emits = 12; // / Outputs the feedback publishes
  bool disabled = 13;
}

message FeedbackInfoMessages {
  repeated FeedbackInfoMessage infos = 1;
}
