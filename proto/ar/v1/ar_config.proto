syntax = "proto3";
package ar.v1;

import "ar/v1/input_slot.proto";
import "buf/validate/validate.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.AR.V1";
option go_package = "github.com/cobotar/protocol/messages/ar/v1";

message ARConfigInfoMessage { // Just delete this?
  string id = 1; // Stable config identifier.
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  string icon = 3;
  string description = 4;
}

message ARConfigInfoMessages {
  repeated ARConfigInfoMessage infos = 1; // Lightweight AR config metadata entries.
}

// ARConfigMessage is the reusable authoring-time template for an AR experience.
//
// It references feedback, actions, helpers, properties, and input slots that
// are later materialized through ARConfigBindingMessage and runtime resolution.
message ARConfigMessage {
  string id = 1; // Stable config identifier.
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
  string icon = 3;
  string description = 4;
  int64 ar_disappear_distance = 5 [(buf.validate.field).int64 = {
    gte: 0
    example: 350 // All AR elements will disappear when the user is more than 350cm from the main marker.
  }]; // Threshold distance in cm all AR elements should disappear. 0 = ignored
  repeated string feedback_ids = 6; // Feedback entities belonging to this config.
  repeated string action_ids = 7; // Action entities belonging to this config.
  repeated string helper_ids = 8; // Helper entities belonging to this config.
  repeated string property_ids = 9 [(buf.validate.field).repeated.items.string.(validation.v1.property_id_component) = true]; // Includes server-managed generated properties for referenced input slots.
  repeated ARInputSlotMessage input_slots = 10; // Authoritative config-owned input slots, edited directly as ARInputSlotMessage entities.
}

message ARConfigMessages {
  repeated ARConfigMessage configs = 1; // AR config templates.
}
