syntax = "proto3";
package capability.v1;

import "buf/validate/validate.proto";
import "common/v1/actor.proto";
import "google/protobuf/timestamp.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Capability.V1";
option go_package = "github.com/cobotar/protocol/messages/capability/v1";

/*
   Alternative categories:
   AWARE: Understands concept
   ASSISTED: Can perform with guidance
   COMPETENT: Can perform independently
   EXPERT: Can troubleshoot and optimize
   CERTIFIED: Officially qualified
*/
enum SkillLevel {
  SKILL_LEVEL_UNSPECIFIED = 0;
  SKILL_LEVEL_NOT_ALLOWED = 1; // Human: Untrained, Robot: Not programmed
  SKILL_LEVEL_ASSISTED = 2; // Human: AR-guided, Robot: Supervised execution
  SKILL_LEVEL_QUALIFIED = 3; // Human: Certified operator, Robot: validated program
  SKILL_LEVEL_EXPERT = 4; // Human: Technician, Robot: Optimized & adaptive
  SKILL_LEVEL_AUTHORITY = 5; // Human: Trainer, Robot: Self-adjusting
}

// SkillStatus describes the current usability of an actor's skill.
//
// The status is operational and should be interpreted together with the
// associated policy, validity timestamps, and any derived restrictions.
//
// Typical semantics:
// - ACTIVE      -> skill is fully usable
// - RESTRICTED  -> skill is usable, but only under additional runtime
//                  safeguards such as AR guidance, extra validation,
//                  supervision, or other assistance
// - EXPIRED     -> skill is no longer valid and must not be used
//
// Loaders and runtime planners should therefore treat:
// - ACTIVE     -> feasible
// - RESTRICTED -> feasible with restrictions
// - EXPIRED    -> infeasible
enum SkillStatus {
  SKILL_STATUS_UNSPECIFIED = 0;

  // Skill is valid and can be used normally.
  SKILL_STATUS_ACTIVE = 1;

  // Skill is allowed but restricted. The actor may perform the task but additional safeguards
  //
  // Examples:
  // - AR guidance required
  // - manual confirmation required
  // - second check required
  // - supervisor approval required
  SKILL_STATUS_RESTRICTED = 2;

  // Skill is no longer valid and cannot be used.
  SKILL_STATUS_EXPIRED = 3;
}

// SkillInvalidityReason explains why an actor skill is currently restricted,
// expired, or otherwise not fully valid.
//
// These reasons are intended to be stable, machine-readable summary codes that
// can be shown in UI, used in loaders/runtime checks, and derived from evidence,
// policy evaluation, or engineering-change events.
enum SkillInvalidityReason {
  SKILL_INVALIDITY_REASON_UNSPECIFIED = 0;

  // The skill has degraded due to lack of recent practice or evidence of use.
  //
  // Typical examples:
  // - no executions in the active policy window
  // - no recent successful evidence for the skill
  SKILL_INVALIDITY_REASON_INACTIVITY = 1;

  // The skill is restricted or invalid because observed failure rate or quality
  // performance exceeded the allowed threshold.
  //
  // Typical examples:
  // - too many failed executions in the recent window
  // - too many out-of-tolerance results
  // - too many inspection failures or retries
  SKILL_INVALIDITY_REASON_FAILURE_RATE = 2;

  // The governing validity/certification policy has expired the skill based on
  // time or other policy-defined rules.
  //
  // Typical examples:
  // - certification period elapsed
  // - revalidation deadline passed
  SKILL_INVALIDITY_REASON_POLICY_EXPIRED = 3;

  // The skill has been invalidated because a relevant engineering or process
  // change means previous validation/training can no longer be trusted.
  //
  // Typical examples:
  // - tool model or capability changed
  // - torque/program parameters changed
  // - product revision changed
  // - robot program or fixture configuration changed
  SKILL_INVALIDITY_REASON_ENGINEERING_CHANGE = 4;
}

// SkillNextAction describes the recommended next action needed to restore,
// strengthen, or safely compensate for a restricted/expired skill.
//
// These actions are intended to be stable, machine-readable guidance codes that
// can be surfaced in UI and used by operational workflows.
enum SkillNextAction {
  SKILL_NEXT_ACTION_UNSPECIFIED = 0;

  // A short targeted intervention is recommended before normal independent use.
  //
  // Typical examples:
  // - brief AR-guided walkthrough
  // - quick reminder of the critical steps
  // - short digital refresher module
  SKILL_NEXT_ACTION_MICRO_TRAINING = 1;

  // A broader retraining session is recommended because the skill has degraded
  // beyond what a short intervention should address.
  //
  // Typical examples:
  // - instructor-led refresher
  // - extended guided practice
  // - retraining on updated process/tooling
  SKILL_NEXT_ACTION_REFRESHER_TRAINING = 2;

  // Formal re-certification or re-validation is required before the skill can
  // return to normal unrestricted use.
  //
  // Typical examples:
  // - certification renewal
  // - formal competency check
  // - validated robot/program re-approval
  SKILL_NEXT_ACTION_RE_CERTIFICATION = 3;

  // Additional runtime validation must be performed before or during task
  // execution to safely use the skill in its current state.
  //
  // Typical examples:
  // - second check required
  // - vision/tool confirmation required
  // - extra verification step before completion
  SKILL_NEXT_ACTION_EXTRA_VALIDATION_REQUIRED = 4;

  // Supervisor or responsible authority approval is required before the actor
  // may execute tasks relying on this skill.
  //
  // Typical examples:
  // - technician sign-off
  // - team lead approval
  // - engineering approval for temporary restricted use
  SKILL_NEXT_ACTION_SUPERVISOR_APPROVAL_REQUIRED = 5;
}

// SkillEvidenceStats is a lightweight aggregated summary of recent evidence
// relevant to one actor + one skill.
//
// This is intended for fast runtime decisions and policy evaluation. It is
// typically derived from underlying execution evidence and training/certification
// events rather than being treated as the primary source of truth.
//
// The effective aggregation window is policy-dependent. For example, a policy
// may consider only the last N executions, the last N days, or all evidence
// since the most recent certification.
message SkillEvidenceStats {
  int32 success_count = 1 [(buf.validate.field).int32.gte = 0]; // Aggregated successful executions/evidence in the active evaluation window.
  int32 failure_count = 2 [(buf.validate.field).int32.gte = 0]; // Aggregated failed executions/evidence in the active evaluation window.

  google.protobuf.Timestamp last_success_at = 3;
  google.protobuf.Timestamp last_failure_at = 4;
  google.protobuf.Timestamp last_activity_at = 5;

  float rolling_success_rate = 6 [(buf.validate.field).float = {
    gte: 0
    lte: 1
  }]; // Optional derived metric in [0,1].
}

// ValidityPolicyRef identifies the policy definition and version currently used
// to derive validity, degradation, and recovery behavior for this actor skill.
message ValidityPolicyRef {
  string policy_id = 1;
  string version = 2;
}

// ActorSkill stores the current operational summary of one skill for one actor.
//
// It is intentionally a fast, runtime-friendly summary layer rather than a full
// audit log. Runtime planners/loaders should use this message to determine
// whether an actor is:
// - allowed
// - restricted
// - expired
//
// ExecutionEvidence and training/certification events are expected to update
// this summary over time.
message ActorSkill {
  string id = 1;
  string name = 2;
  string icon = 3;
  common.v1.ActorRef actor = 4 [(buf.validate.field).required = true];
  string skill_id = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.skill_id_component) = true
  ];
  SkillLevel level = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  SkillStatus status = 7 [(buf.validate.field).enum.defined_only = true];
  float confidence_score = 8 [(buf.validate.field).float = {
    gte: 0
    lte: 1
  }]; // Optional derived confidence/proficiency score in [0,1].

  SkillEvidenceStats stats = 9; // Aggregated evidence summary used for fast runtime decisions.

  google.protobuf.Timestamp last_training_at = 10; // Most recent training/refresher event relevant to this skill.
  google.protobuf.Timestamp last_certified_at = 11; // Most recent formal certification/re-certification event.

  google.protobuf.Timestamp valid_until = 12; // Explicit validity limit if known, otherwise policy-derived.
  ValidityPolicyRef validity_policy = 13; // Policy currently used to evaluate status/validity.
  repeated SkillInvalidityReason reasons = 14 [(buf.validate.field).repeated.items.enum.defined_only = true];
  repeated SkillNextAction next_actions = 15 [(buf.validate.field).repeated.items.enum.defined_only = true];
}

message ActorSkills {
  repeated ActorSkill items = 1;
}

/*
       Policies:
       Use policy types per Skill Unit (and optionally per context/tool constraint)
       - Time-based expiry (certification-style)
       Good for safety/quality critical skills.
       Example policy (SK-03 Apply Controlled Torque):
       •	Active for 180 days after training or validated evidence
       •	Restricted after 180 days (allowed only with AR guidance + extra checks)
       •	Expired after 365 days (not allowed)

       - Usage-based decay (practice-style)
       Good for skills that fade when not used.
       Example:
       •	If no executions in the last 30 days → confidence drops
       •	If no executions in 90 days → status becomes Restricted
       •	If no executions in 180 days → Expired

       - Error-rate/quality-triggered restriction (performance-style)
       Good when you have tool telemetry or inspection results.
       Example:
       •	If torque-out-of-range rate > 2% in last 50 ops → Restricted + mandatory refresher micro-training
       •	If > 5% → Expired (lockout until retrained)

       - Change-triggered invalidation (engineering-change-style)
       Critical for robots and tooling changes.
       Triggers:
       •	Tool model/variant changes (new torque driver range, new bit, new EOAT)
       •	Process parameter changes (torque spec changes)
       •	Product revision changes (new screw length/material)
       •	Robot program hash changes (or new validated program version)
       Result:
       •	Human: may become Restricted until quick re-brief
       •	Robot: becomes Expired until program re-validated

       Ideas for starter policies (use just three tiers across all skills at first):
       1.	Critical (safety/quality): time-based expiry + error-trigger restriction
       2.	Important (performance): usage-based decay + mild restriction
       3.	General: no expiry, only change-triggered invalidation

       3) Retraining types (keep it lightweight)
       Define retraining as small “events” with effect sizes:
       •	Micro-training (2–5 min): restores confidence + extends Active by a short period
       Use when Restricted due to inactivity.
       •	Refresher training (15–30 min): restores to prior level, extends Active fully
       Use when near-expiry or minor performance drift.
       •	Re-certification (formal): required if Expired or high-risk triggers
       Use for safety-critical skills.

       Store retraining as evidence with a training_type and grants (level/status/validity).

       4) Runtime rules in AR (what the operator experiences)
       When a step requires skill_id = SK-03, min_level = 2:
       •	Active, level ≥ 2 → normal UI, minimal prompts
       •	Restricted, level ≥ 2 → AR “assist mode”:
       •	show screw sequence overlays
       •	require explicit tool confirmation
       •	add extra verification (e.g., torque log must be present)
       •	Expired or level < 2 → block step:
       •	show “Training required: Apply Controlled Torque”
       •	offer “Call supervisor / start micro-training” (workflow hook)
       This makes degradation felt as guidance and gating—not just admin paperwork.

       5) Robot equivalence: “skill validity” = “program + cell validation”
       For robots, the same mechanism works if you treat evidence differently:
       Robot evidence examples:
   •	Program validation record (version/hash, cell ID, EOAT ID)
       •	Successful run count with pass/fail inspection linkage
       •	Safety validation state (collab mode constraints satisfied)
       Degradation examples:
       •	No runs for N days → confidence drops (recommend supervised first run)
       •	Program changed → Expired until validated
   •	EOAT changed → Expired until TCP + force/torque calibration verified

*/

/*
   Example skills

   Step 1 - Position Cover
     Instruction: “Place the gearbox cover onto the housing.”
   •	Skill required: SK-01 – Grip and Position Component
         •	Minimum level: 1 (Assisted)
         •	Tool roles: Grip workpiece, Position component
         •	Actors allowed: Human, Robot

   AR Behavior
   •	Outline shows correct placement
   •	Ghosted preview snaps into place
   •	If skill level = 1 → alignment hints stay visible
   •	If skill level ≥ 2 → hints fade earlier

   Step 2 - Align the Cover
     Instruction: “Align the cover until all guide pins are seated.”

     •	Skill: SK-06 – Align Component
     •	Tool roles: Align component
     •	Safety relevance: Medium

     AR behavior
     •	Arrows indicate micro-adjustments
     •	Live feedback: “Alignment OK”
     •	Step cannot complete until tolerance met

   Step 3 — Fasten Screws (HRC Decision Point)
     Instruction (dynamic): “Fasten 4 screws to 0.8 Nm.”

     Skill-gated decision
     •	Skill: SK-03 – Apply Controlled Torque
     •	Minimum level: 2 (Qualified)
     •	Tool role: Apply torque
     System checks
     Option                                    Result
     Human + torque screwdriver + certified    ✅
     Human + manual screwdriver                ❌
     Robot screwdriver EOAT + validated        ✅ (EOAT = End-of-Arm Tooling)

     Path A - Human performs fastening
       AR behavior
       •	Highlights correct screw order
       •	Shows live torque gauge
       •	Locks step until torque confirmed
       •	Warns on wrong bit or tool

     Path B — Robot Performs Fastening
       AR behavior
       •	Shows robot intent path
       •	Displays “Robot fastening in progress”
       •	Human restricted zone visualized
       •	Status updates per screw

   Step 4 — Validate Fastening
   Instruction: “Verify all screws are secured.”
     Logic
       •	Skill: SK-05 – Validate Fastening Quality
       •	Actors: Human or Robot
       •	Tool roles: Detect presence, Measure torque

     AR behavior
       •	Checkmarks appear per screw
       •	Vision system or torque log auto-confirms
       •	Manual confirmation only allowed if skill ≥ 2

   Step 5 — Completion & Traceability
     System outcome
     •	Skills used recorded
     •	Tools logged
     •	Actor (human/robot) recorded
     •	Deviations flagged automatically
*/
