syntax = "proto3";
package seed.v1;

option csharp_namespace = "Messages.Seed.V1";
option go_package = "github.com/cobotar/protocol/messages/seed/v1";

message SeedFile {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  string file = 5;
}

message SeedFiles {
  repeated SeedFile items = 1;
}
