syntax = "proto3";
package plm.v1;

import "geometry/v1/pose.proto";

option csharp_namespace = "Messages.Plm.V1";
option go_package = "github.com/cobotar/protocol/messages/plm/v1";

message StoredSequenceMessage {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  int64 sequence_number = 5;
  geometry.v1.Pose frame = 6;
  repeated string sequence_ids = 8;
  repeated string task_ids = 9;
  bool can_bulk_complete = 12;
}

message StoredSequenceMessages {
  repeated StoredSequenceMessage sequences = 1;
}

message NewSequenceMessage {
  string name = 3;
  string description = 4;
  string parent_id = 6;
}

message UpdateSequenceMessage {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  int64 sequence_number = 5;
  geometry.v1.Pose frame = 6;
  repeated string sequence_ids = 8;
  repeated string task_ids = 9;
  bool can_bulk_complete = 12;
}
