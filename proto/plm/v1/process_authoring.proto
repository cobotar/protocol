syntax = "proto3";
package plm.v1;

import "geometry/v1/pose.proto";
import "plm/v1/process.proto";

option csharp_namespace = "Messages.Plm.V1";
option go_package = "github.com/cobotar/protocol/messages/plm/v1";

message StoredProcessMessage { // TODO: rename to recipe?
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  ProcessType type = 5;
  geometry.v1.Pose fixture_offset = 6;
  string root_sequence_id = 7;
}

message StoredProcessMessages {
  repeated StoredProcessMessage processes = 1;
}

message NewProcessMessage {
  string name = 2;
  string icon = 3;
  string description = 4;
  ProcessType type = 5;
}

message UpdateProcessMessage {
  string id = 1;
  string name = 2;
  string icon = 3;
  string description = 4;
  ProcessType type = 5;
  geometry.v1.Pose fixture_offset = 6;
  string root_sequence_id = 7;
}
