syntax = "proto3";
package runtime.v1;

import "buf/validate/validate.proto";
import "common/v1/actor.proto";
import "google/protobuf/timestamp.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Runtime.V1";
option go_package = "github.com/cobotar/protocol/messages/runtime/v1";

// EvidenceFact stores a flexible key/value fact recorded during execution.
// Use this for measurements, classifications, result details, operator notes,
// and other structured runtime output.
message EvidenceFact {
  string key = 1;
  string value = 2;
  string unit = 3;
}

// ExecutionEvidence records runtime facts produced during task execution.
//
// It is task-run-centric and primarily supports traceability, validation,
// analytics, and downstream aggregation into actor skill state.
//
// The normalized fields such as actor, skill_id, and success are optional but
// strongly recommended when known, because they make later aggregation much
// simpler and more robust than parsing facts alone.
message ExecutionEvidence {
  string id = 1;
  string task_run_id = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.task_run_id_component) = true
  ];
  string source = 3; // tool, vision, operator, robot driver, etc.
  google.protobuf.Timestamp recorded_at = 4;
  repeated EvidenceFact facts = 5;
  string blob_uri = 6; // Optional external payload such as image, log, trace, or report.

  common.v1.ActorRef actor = 7; // Optional actor who produced or is primarily associated with this evidence.
  string skill_id = 8; // Optional skill primarily exercised or validated by this evidence.
  bool success = 9; // normalized success signal when known
}

message ExecutionEvidences {
  repeated ExecutionEvidence items = 1;
}

