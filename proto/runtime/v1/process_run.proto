syntax = "proto3";
package runtime.v1;

import "buf/validate/validate.proto";
import "geometry/v1/pose.proto";
import "google/protobuf/timestamp.proto";
import "runtime/v1/actor_assignment.proto";
import "validation/v1/predefined_string_rules.proto";
import "variance/v1/variant_configuration.proto";

option csharp_namespace = "Messages.Runtime.V1";
option go_package = "github.com/cobotar/protocol/messages/runtime/v1";

enum ProcessRunState {
  PROCESS_RUN_STATE_UNSPECIFIED = 0;
  PROCESS_RUN_STATE_QUEUED = 1; // Queued, can not be started yet
  PROCESS_RUN_STATE_READY = 2; // Waiting to be started (ready)
  PROCESS_RUN_STATE_IN_PROGRESS = 3; // In progress
  PROCESS_RUN_STATE_DONE = 4; // Completed, all tasks are complete
  PROCESS_RUN_STATE_ABORTED = 5;
}

message RunParameter {
  string key = 1; // "color", "label_text", "customer_name"
  string value = 2;
}

// ProcessRun is only created when a concrete cell can currently satisfy it.
// Is is based upon a ProcessRecipe which defines what must be possible.
message ProcessRun {
  string id = 1;
  string name = 2;
  string icon = 3;
  string process_recipe_id = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.process_recipe_id_component) = true
  ];
  string order_id = 5;
  string station_id = 6 [
    // (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.station_id_component) = true
  ];
  string cell_id = 7 [
    // (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.cell_id_component) = true
  ];
  string line_id = 8 [
    // (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.line_id_component) = true
  ];
  geometry.v1.LocalizedPose frame = 9;
  string root_sequence_run_id = 10 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.sequence_run_id_component) = true
  ];
  repeated string sequence_run_ids = 11 [(buf.validate.field).repeated.items.string.(validation.v1.sequence_run_id_component) = true];
  repeated string task_run_ids = 12 [(buf.validate.field).repeated.items.string.(validation.v1.task_run_id_component) = true];
  ProcessRunState state = 13 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  google.protobuf.Timestamp initiated_at = 14;
  google.protobuf.Timestamp ended_at = 15;
  repeated ActorAssignment assignments = 16;
  variance.v1.VariantConfiguration variant_configuration = 17;
  repeated RunParameter parameters = 18;
}

message ProcessRuns {
  repeated ProcessRun items = 1;
}
