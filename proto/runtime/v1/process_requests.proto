syntax = "proto3";
package runtime.v1;

import "buf/validate/validate.proto";
import "common/v1/actor.proto";
import "common/v1/key_value_constraint.proto";
import "runtime/v1/process_run.proto";
import "runtime/v1/runtime_restriction.proto";
import "validation/v1/predefined_string_rules.proto";
import "variance/v1/variant_configuration.proto";

option csharp_namespace = "Messages.Runtime.V1";
option go_package = "github.com/cobotar/protocol/messages/runtime/v1";

enum ProcessLoadStrategy {
  PROCESS_LOAD_STRATEGY_UNSPECIFIED = 0;

  // Prefer the first feasible candidate found.
  PROCESS_LOAD_STRATEGY_FIRST_FEASIBLE = 1;

  // Prefer OPEN stations over BUSY ones, and BUSY over queued ones.
  PROCESS_LOAD_STRATEGY_PREFER_AVAILABLE = 2;

  // Prefer keeping work inside the explicitly selected cell if one is set.
  PROCESS_LOAD_STRATEGY_PREFER_TARGET_SCOPE = 3;

  // Prefer the candidate with the strongest resource/actor match.
  PROCESS_LOAD_STRATEGY_BEST_MATCH = 4;
}

// ProcessLoadRequest is used to instantiate a ProcessRecipe into a ProcessRun.
//
// The loader should evaluate whether the recipe can be instantiated now within
// the requested operational scope, using currently available actors, tools,
// robots, containers, assets, and validation resources.
//
// Target scope resolution:
//
// - target_line_id is the top-level routing scope and is required.
// - if target_cell_id is set, the loader must validate and use that cell.
// - if target_station_id is set, the loader must validate and use that station.
// - if cell/station are not set, the loader should choose the best feasible
//   candidate within the selected line.
//
// Occupancy handling:
//
// - if a candidate station is BUSY and queue_if_occupied is true, the loader
//   may create a queued ProcessRun.
// - if queue_if_occupied is false, the loader should only queue when the chosen
//   target explicitly allows queued processes.
// - otherwise the load should fail with a blocking issue.
//
// Thus the following must be evaluated:
// - available robots (if any task requires or strongly prefers a robot, can that be satisfied?)
// - available workers (if tasks requires only-human or need certain skills, can that be satisfied? Either check immediately or defer until operator is assigned. Perhaps assigned based on skills and availability? Check that: assigned worker exist, worker enabled, required skills present and valid)
// - available tool instances (all ToolRequirements from all tasks, available ToolInstances is station/cell, tool status, calibration validity, required properties, minimum capability profile)
// - valid calibration
// - fixture availability/feasibility (recipe supported fixtures, available fixture instances, fixture status, product/recipe compatibility)
// - safety mode / collaboration mode (check: recipe task collaboration modes, station/cell safety mode, whether simultaneous HRC is allowed, whether human-only or robot-only is possible right now)
// - active faults / disabled resources
// - asset / inspection feasibility (if validation required: vision, torque feedback, external QC, sensors --> then verify those assets exist and are available.)
message ProcessLoadRequest {
  string process_recipe_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.process_recipe_id_component) = true
  ]; // Required recipe to instantiate.
  string target_line_id = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.line_id_component) = true
  ]; // Required top-level routing scope.

  // Optional narrowing of the target scope.
  // If set, the loader must validate and respect these targets.
  string target_cell_id = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.cell_id_component) = true
  ];
  string target_station_id = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.station_id_component) = true
  ];

  // Optional variant configuration used to evaluate recipe/task applicability.
  variance.v1.VariantConfiguration variant_configuration = 5;

  // true  -> perform precheck only
  // false -> perform precheck and instantiate ProcessRun if feasible
  bool dry_run = 6;

  // If true, the loader may create a queued ProcessRun when the preferred
  // execution target is currently BUSY but otherwise feasible.
  bool queue_if_occupied = 7;

  // Optional execution preferences for the loader.
  ProcessLoadStrategy strategy = 8 [(buf.validate.field).enum.defined_only = true];

  // Optional order/business reference to carry into the ProcessRun.
  string order_id = 9;

  // Optional caller-provided parameters used during instantiation.
  repeated common.v1.KeyValueConstraint parameters = 10;
}

enum ProcessLoadFailure {
  PROCESS_LOAD_FAILURE_UNSPECIFIED = 0;
  // General failures
  PROCESS_LOAD_FAILURE_PROCESS_RECIPE_NOT_FOUND = 2;
  PROCESS_LOAD_FAILURE_PRODUCT_NOT_SUPPORTED = 3;
  PROCESS_LOAD_FAILURE_RESOURCE_STATE_UNKNOWN = 4;

  // Container related failures
  PROCESS_LOAD_FAILURE_NO_COMPATIBLE_CONTAINER = 10;
  PROCESS_LOAD_FAILURE_REQUIRED_SLOT_NOT_FOUND = 11;
  PROCESS_LOAD_FAILURE_REQUIRED_SLOT_TYPE_NOT_FOUND = 12;

  // Tool related failures
  PROCESS_LOAD_FAILURE_MISSING_TOOL_ROLE = 20;
  PROCESS_LOAD_FAILURE_TOOL_NOT_CALIBRATED = 21;
  PROCESS_LOAD_FAILURE_TOOL_CAPABILITY_INSUFFICIENT = 22;

  // Robot related failures
  PROCESS_LOAD_FAILURE_ROBOT_UNAVAILABLE = 30;
  PROCESS_LOAD_FAILURE_ROBOT_TOOLING_MISMATCH = 31;

  // Agent/operator related failures
  PROCESS_LOAD_FAILURE_NO_QUALIFIED_OPERATOR = 40; // A human is required but no worker with valid skills exists.
  PROCESS_LOAD_FAILURE_NO_FEASIBLE_ACTOR = 41; // No actor type can perform the task.
  PROCESS_LOAD_FAILURE_REQUIRED_SKILL_RESTRICTED = 42;
  PROCESS_LOAD_FAILURE_REQUIRED_SKILL_EXPIRED = 43;

  // Safety / collaboration related failures
  PROCESS_LOAD_FAILURE_COLLABORATION_MODE_UNSUPPORTED = 50;
  PROCESS_LOAD_FAILURE_SAFETY_MODE_MISMATCH = 51;

  // Validation related failures
  PROCESS_LOAD_FAILURE_VISION_ASSET_UNAVAILABLE = 60;
  PROCESS_LOAD_FAILURE_VALIDATION_SOURCE_MISSING = 61;
  PROCESS_LOAD_FAILURE_NO_FEASIBLE_VALIDATION_METHOD = 62;

  // Line related failures
  PROCESS_LOAD_FAILURE_LINE_NOT_FOUND = 70;
  PROCESS_LOAD_FAILURE_LINE_CLOSED = 71;
  PROCESS_LOAD_FAILURE_LINE_BUSY = 72;
  PROCESS_LOAD_FAILURE_LINE_BLOCKED = 73;

  // Cell related failures
  PROCESS_LOAD_FAILURE_CELL_NOT_FOUND = 80;
  PROCESS_LOAD_FAILURE_CELL_CLOSED = 81;
  PROCESS_LOAD_FAILURE_CELL_BUSY = 82;
  PROCESS_LOAD_FAILURE_CELL_BLOCKED = 83;

  // Station related failures
  PROCESS_LOAD_FAILURE_STATION_NOT_FOUND = 90;
  PROCESS_LOAD_FAILURE_STATION_CLOSED = 91;
  PROCESS_LOAD_FAILURE_STATION_BUSY = 92;
  PROCESS_LOAD_FAILURE_STATION_BLOCKED = 93;
}

enum ProcessRunIssueSeverity {
  PROCESS_RUN_ISSUE_SEVERITY_UNSPECIFIED = 0;
  PROCESS_RUN_ISSUE_SEVERITY_BLOCKING = 1; // Run cannot start. Some reasons: no compatible fixture, required tool missing, robot required but unavailable, safety mode incompatible, no feasible actor for only-human/only-robot task
  PROCESS_RUN_ISSUE_SEVERITY_WARNING = 2; // Run may start, but quality/performance may suffer. Examples: preferred robot unavailable (but human can do task), calibration expires soon, only one qualified actor available, vision unavailable but manual confirmation allowed.
}

enum RequirementImportance {
  REQUIREMENT_IMPORTANCE_UNSPECIFIED = 0;
  REQUIREMENT_IMPORTANCE_REQUIRED = 1;
  REQUIREMENT_IMPORTANCE_PREFERRED = 2;
}

message ProcessRunIssue {
  ProcessLoadFailure failure = 1;
  string message = 2;
  ProcessRunIssueSeverity severity = 3;

  // Scope
  string process_recipe_id = 4;
  string sequence_definition_id = 5;
  string task_definition_id = 6;

  // Related requirement/resource
  string required_tool_role = 7;
  string required_skill_id = 8;
  string fixture_definition_id = 9;
  string cell_id = 10;
  string station_id = 11;
  string actor_id = 12;
  string resource_id = 13; // tool/robot/fixture/asset instance if known

  // Optional remediation hint
  string remediation = 14;

  RequirementImportance importance = 15;
}

message CandidateActorEvaluation {
  common.v1.ActorRef actor = 1;

  // Whether this actor is currently feasible for the task.
  bool feasible = 2;

  // Effective restrictions if this actor were assigned.
  repeated RuntimeRestriction restrictions = 3;

  // Optional explanations or issues tied specifically to this actor.
  repeated ProcessRunIssue issues = 4;
}

message TaskFeasibility {
  string task_definition_id = 1;
  bool feasible = 2;

  repeated common.v1.ActorRef candidate_actors = 3;
  repeated string candidate_robot_instance_ids = 4;
  repeated string candidate_tool_instance_ids = 5;
  repeated string candidate_container_instance_ids = 6;
  repeated string candidate_asset_instance_ids = 7;

  repeated ProcessRunIssue issues = 8;

  repeated CandidateActorEvaluation candidate_actor_evaluations = 9;
}

enum ProcessRunPrecheckStatus {
  PROCESS_RUN_PRECHECK_STATUS_UNSPECIFIED = 0;
  PROCESS_RUN_PRECHECK_STATUS_OK = 1; // Neither warning nor blocking issues
  PROCESS_RUN_PRECHECK_STATUS_OK_WITH_WARNINGS = 2; // One or more warning issues, but no blocking
  PROCESS_RUN_PRECHECK_STATUS_BLOCKED = 3; // One or more blocking issues
}

message ProcessRunPrecheckResult {
  bool ok = 1;
  repeated ProcessRunIssue issues = 2;

  // Optional summary counts for UI / fast filtering
  int32 blocking_issue_count = 3;
  int32 warning_issue_count = 4;

  // What was checked
  string process_recipe_id = 5;
  string target_line_id = 6;

  // Optional: useful if precheck computes feasible assignments/resources
  repeated TaskFeasibility task_feasibility = 7;

  // Optional overall status
  ProcessRunPrecheckStatus status = 8;
}

enum ProcessLoadStatus {
  PROCESS_LOAD_STATUS_UNSPECIFIED = 0;
  PROCESS_LOAD_STATUS_PRECHECK_FAILED = 1;
  PROCESS_LOAD_STATUS_READY = 2; // feasible, but not instantiated (dry run)
  PROCESS_LOAD_STATUS_LOADED = 3; // feasible and instantiated
}

message ProcessLoadResult {
  ProcessLoadStatus status = 1;
  ProcessRunPrecheckResult precheck = 2;
  runtime.v1.ProcessRun process_run = 3;
}

/*
   Examples:

   ProcessRunPrecheckResult {
     ok: false
     blocking_issue_count: 2
     warning_issue_count: 1
     process_recipe_id: "recipe-door-left"
     target_line_id: "line-assembly-1"
     status: PROCESS_RUN_PRECHECK_STATUS_BLOCKED

     issues: [
       {
         failure: PROCESS_LOAD_FAILURE_NO_COMPATIBLE_FIXTURE
         severity: PROCESS_RUN_ISSUE_SEVERITY_BLOCKING
         message: "No compatible fixture available for recipe"
         process_recipe_id: "recipe-door-left"
         remediation: "Install fixture fixture-door-left"
       },
       {
         failure: PROCESS_LOAD_FAILURE_ROBOT_UNAVAILABLE
         severity: PROCESS_RUN_ISSUE_SEVERITY_BLOCKING
         message: "Robot robot-ur10-1 is unavailable"
         task_definition_id: "task-fasten-hinge"
         actor_id: "robot-ur10-1"
         remediation: "Restore robot or select another cell"
       },
       {
         failure: PROCESS_LOAD_FAILURE_VISION_ASSET_UNAVAILABLE
         severity: PROCESS_RUN_ISSUE_SEVERITY_WARNING
         message: "Vision asset unavailable; manual confirmation is allowed"
         task_definition_id: "task-verify-label"
         remediation: "Use manual confirmation or restore camera"
       }
     ]
   }

   ProcessLoadResult {
     status: PROCESS_LOAD_STATUS_LOADED
     precheck: {
       ok: true
       blocking_issue_count: 0
       warning_issue_count: 1
       status: PROCESS_RUN_PRECHECK_STATUS_OK_WITH_WARNINGS
       issues: [
         {
           failure: PROCESS_LOAD_FAILURE_TOOL_NOT_CALIBRATED
           severity: PROCESS_RUN_ISSUE_SEVERITY_WARNING
           message: "Torque tool calibration expires soon"
         }
       ]
     }
     process_run: {
       id: "run-123"
       recipe_id: "recipe-door-left"
       ...
     }
   }
*/
