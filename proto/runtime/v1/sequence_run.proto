syntax = "proto3";
package runtime.v1;

import "buf/validate/validate.proto";
import "common/v1/actor.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Runtime.V1";
option go_package = "github.com/cobotar/protocol/messages/runtime/v1";

enum SequenceRunState {
  SEQUENCE_RUN_STATE_UNSPECIFIED = 0;
  SEQUENCE_RUN_STATE_NOT_READY = 1;
  SEQUENCE_RUN_STATE_READY = 2;
  SEQUENCE_RUN_STATE_IN_PROGRESS = 3;
  SEQUENCE_RUN_STATE_DONE = 4;
  SEQUENCE_RUN_STATE_ABORTED = 5;
}

message SequenceRun {
  string id = 1;
  string name = 2;
  string icon = 3;
  string sequence_definition_id = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.sequence_definition_id_component) = true
  ];
  string parent_sequence_run_id = 5 [(buf.validate.field).string.(validation.v1.task_run_id_component) = true];
  repeated string child_sequence_run_ids = 6;
  repeated string child_task_run_ids = 7;
  SequenceRunState state = 8 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  int32 completed_tasks = 9 [(buf.validate.field).int32.gte = 0];
  bool can_bulk_complete = 10;
  repeated common.v1.ActorRef assigned_actors = 11;
}

message SequenceRuns {
  repeated SequenceRun items = 1;
}
