syntax = "proto3";
package runtime.v1;

import "buf/validate/validate.proto";
import "common/v1/actor.proto";
import "common/v1/key_value_constraint.proto";
import "google/protobuf/timestamp.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Runtime.V1";
option go_package = "github.com/cobotar/protocol/messages/runtime/v1";

enum ValidationStatus {
  VALIDATION_STATUS_UNSPECIFIED = 0;
  VALIDATION_STATUS_PENDING = 1;
  VALIDATION_STATUS_PASSED = 2;
  VALIDATION_STATUS_FAILED = 3;
  VALIDATION_STATUS_BYPASSED = 4;
}

message ValidationResult {
  string id = 1;
  string task_run_id = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.task_run_id_component) = true
  ];
  ValidationStatus status = 3 [
    // (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  string method = 4; // tool_feedback / vision / manual / external_qc
  google.protobuf.Timestamp validated_at = 5;
  repeated common.v1.KeyValueConstraint measurements = 6;
  common.v1.ActorRef validated_by_actor = 7;
  string comment = 8;
}
