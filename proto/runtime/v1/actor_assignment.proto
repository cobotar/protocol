syntax = "proto3";
package runtime.v1;

import "buf/validate/validate.proto";
import "common/v1/actor.proto";
import "google/protobuf/timestamp.proto";
import "validation/v1/predefined_string_rules.proto";

option csharp_namespace = "Messages.Runtime.V1";
option go_package = "github.com/cobotar/protocol/messages/runtime/v1";

message ActorAssignment {
  string id = 1;
  common.v1.ActorRef actor = 2 [(buf.validate.field).required = true];
  string process_run_id = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.process_run_id_component) = true
  ];
  string sequence_run_id = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.sequence_run_id_component) = true
  ];
  string task_run_id = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.(validation.v1.task_run_id_component) = true
  ];
  google.protobuf.Timestamp assigned_at = 6;
  google.protobuf.Timestamp released_at = 7;
}

message ActorAssignments {
  repeated ActorAssignment items = 1;
}
